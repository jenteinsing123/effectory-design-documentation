<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Effectiveness results — Focus View</title>
  <base href="../" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="foundation.css" />
  <link rel="stylesheet" href="components.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg-interface-body);
      color: var(--content-base);
      font-family: 'Poppins', sans-serif;
      /* Results page container padding (Figma: results/padding) — built from spacing tokens */
      --results-side: calc(var(--spacing-super-loose) * 2); /* 80px — container-sides */
      --results-top: calc(var(--spacing-loose) * 2);        /* 48px — container-top-bot */
    }

    /* App shell */
    .app { display: flex; height: 100vh; overflow: hidden; }

    /* Language popover (sidebar user block) */
    .mn-user { position: relative; cursor: pointer; }
    .lang-pop {
      position: absolute; bottom: calc(100% + var(--spacing-tight)); left: 0; right: 0;
      display: flex; flex-direction: column; gap: 2px;
      padding: var(--spacing-extra-tight);
      background: var(--bg-base); border: 1px solid var(--border-base);
      border-radius: var(--radius-md); box-shadow: var(--sh-popovers); z-index: 60;
    }
    .lang-pop[hidden] { display: none; }
    .lang-opt {
      display: flex; align-items: center;
      padding: var(--spacing-tight) var(--spacing-base-tight);
      border: 0; background: none; border-radius: var(--radius-base);
      font-family: inherit; font-size: 14px; color: var(--content-base);
      text-align: left; cursor: pointer;
    }
    .lang-opt:hover { background: var(--bg-secondary); }
    .lang-opt.is-active { font-weight: 600; color: var(--content-brand-base); }
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .main-scroll { flex: 1; overflow-y: auto; }

    /* Animated switch between views (View Transitions API): a soft focus-pull —
       the whole screen blurs out and the new view sharpens back into focus. */
    @view-transition { navigation: auto; }
    ::view-transition-old(root) { animation: vt-blur-out 2.6s linear both; }
    ::view-transition-new(root) { animation: vt-blur-in 2.6s linear both; }
    /* fast blur-in (~0.2s) -> hold blurred (~2s) -> fast sharpen (~0.4s) */
    @keyframes vt-blur-out {
      0%   { filter: blur(0);    opacity: 1; transform: scale(1); }
      8%   { filter: blur(20px); opacity: 0; transform: scale(1.06); }
      100% { filter: blur(20px); opacity: 0; transform: scale(1.06); }
    }
    @keyframes vt-blur-in {
      0%   { filter: blur(20px); opacity: 0; transform: scale(1.06); }
      8%   { filter: blur(20px); opacity: 1; transform: scale(1.06); }
      85%  { filter: blur(20px); opacity: 1; transform: scale(1.06); }
      100% { filter: blur(0);    opacity: 1; transform: scale(1); }
    }
    @media (prefers-reduced-motion: reduce) {
      ::view-transition-old(root), ::view-transition-new(root) { animation: none; }
    }

    /* Header zone (title, filters, tabs) */
    .results-head {
      padding: var(--results-top) var(--results-side) 0;
    }
    /* Align the breadcrumb content to the same container edge */
    .breadcrumb {
      padding-left: var(--results-side);
      padding-right: var(--results-side);
    }
    .results-title { margin: 0 0 var(--spacing-base); cursor: pointer; width: fit-content; }
    .results-filters {
      display: flex;
      align-items: center;
      gap: var(--spacing-base);
      margin-bottom: var(--spacing-loose);
    }
    .date-range {
      display: flex;
      align-items: center;
      gap: var(--spacing-tight);
      cursor: pointer;
      color: var(--content-secondary);
      font-size: 14px;
      font-weight: 500;
    }
    .date-range i { color: var(--content-subtle); }
    .results-head .tabs { padding: 0 var(--results-side); margin: 0 calc(-1 * var(--results-side)); }
    .results-head .tab .tab-spark { width: 18px; height: 18px; color: var(--bg-highlight-base); }

    /* ── Overview content — centred column ── */
    .overview-wrap {
      max-width: 1248px; /* 1200px grid + 24px padding aan weerszijden */
      margin: 0 auto;
      padding: var(--spacing-super-loose) var(--spacing-loose) var(--spacing-super-extra-loose);
    }

    /* ── Grid: alle kaarten max 384×456, 24px ertussen ── */
    .ov-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 384px));
      gap: var(--spacing-loose);
      justify-content: center;
      width: 100%;
      max-width: 1200px;  /* 3×384 + 2×24 — matches the AI summary width */
      margin: 0 auto;
    }
    /* AI summary tracks the grid width at every breakpoint so their edges line up */
    @media (max-width: 1300px) {
      .ov-grid { grid-template-columns: repeat(2, minmax(0, 384px)); }
      .ai-summary, .ov-grid { max-width: 792px; } /* 2×384 + 24 */
    }
    @media (max-width: 870px) {
      .ov-grid { grid-template-columns: minmax(0, 384px); }
      .ai-summary, .ov-grid { max-width: 384px; }
    }

    /* ── Gedeelde kaart-shell ── */
    .card {
      box-sizing: border-box;
      width: 100%;
      max-width: 384px;
      height: 456px;
      background: var(--bg-base);
      border: 1px solid var(--border-base);
      border-radius: var(--radius-lg);
      box-shadow: var(--sh-card);
      padding: var(--spacing-loose);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-base);
    }

    /* tooltips op icon buttons: verborgen tot hover/focus */
    .tt-demo .tooltip {
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--motion-fast) var(--ease-out);
    }
    .tt-demo:hover .tooltip,
    .tt-demo:focus-within .tooltip {
      opacity: 1;
    }

    /* ════ Effectiveness (kwadrant) ════ */
    .fx-card { gap: var(--spacing-extra-tight); }
    .fx-header { display: flex; align-items: center; gap: var(--spacing-base-tight); }
    .fx-title { flex: 1; margin: 0; }
    .fx-axis { margin: 0; font-size: 14px; line-height: 1.6; color: var(--content-secondary); }
    .fx-axis.is-x { text-align: right; }
    .fx-body { flex: 1; display: flex; flex-direction: column; gap: var(--spacing-tight); min-height: 0; }
    .fx-matrix {
      position: relative;
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: var(--spacing-extra-tight);
    }
    .fx-quad {
      display: flex; align-items: center; justify-content: center;
      padding: var(--spacing-base);
      font-size: 12px; font-weight: 600; line-height: 1.6; text-align: center;
    }
    .fx-quad.is-detached { background: var(--bg-tertiary); color: var(--content-secondary); border-top-left-radius: var(--radius-lg); }
    .fx-quad.is-effective { background: var(--bg-accent-green-subtle); color: var(--content-accent-green-base); border-top-right-radius: var(--radius-lg); }
    .fx-quad.is-ineffective { background: var(--bg-accent-red-subtle); color: var(--content-accent-red-base); border-bottom-left-radius: var(--radius-lg); }
    .fx-quad.is-not-utilized { background: var(--bg-accent-yellow-subtle); color: var(--content-accent-yellow-base); border-bottom-right-radius: var(--radius-lg); }
    .fx-scale {
      position: absolute;
      font-size: 12px; font-weight: 500; line-height: 1.6;
      color: var(--content-secondary);
      padding: var(--spacing-extra-tight) var(--spacing-tight);
    }
    .fx-scale.is-top-left { top: 0; left: 0; }
    .fx-scale.is-bottom-left { bottom: 0; left: 0; }
    .fx-scale.is-bottom-right { bottom: 0; right: 0; }
    .fx-marker { position: absolute; width: 12px; height: 12px; transform: translate(-50%, -50%); }
    .fx-dot {
      width: 12px; height: 12px;
      border-radius: var(--radius-full);
      border: 2px solid var(--border-white);
      box-sizing: border-box;
    }
    .fx-chip {
      position: absolute; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 6px;
      padding: var(--spacing-extra-tight) var(--spacing-tight);
      border-radius: var(--radius-base);
      border: 2px solid var(--border-white);
      box-shadow: var(--sh-card);
      font-size: 12px; font-weight: 500; line-height: 1.6;
      white-space: nowrap;
    }
    .fx-marker.is-chip-above .fx-chip { bottom: calc(100% + var(--spacing-tight)); }
    .fx-marker.is-chip-below .fx-chip { top: calc(100% + var(--spacing-tight)); }
    .fx-chip i { display: flex; width: 12px; height: 12px; flex-shrink: 0; }
    .fx-marker.is-org .fx-dot { background: var(--content-secondary); }
    .fx-marker.is-org .fx-chip { background: var(--bg-tertiary); color: var(--content-base); }
    .fx-marker.is-current .fx-dot { background: var(--content-info-secondary); }
    .fx-marker.is-current .fx-chip { background: var(--bg-info-base); color: var(--content-inverse-base); }
    .fx-marker.is-previous .fx-dot { background: var(--content-info-base); }
    .fx-marker.is-previous .fx-chip { background: var(--bg-accent-blue-subtle); color: var(--content-info-base); }

    /* ════ eNPS ════ */
    .nps-header { display: flex; flex-direction: column; gap: var(--spacing-extra-tight); }
    .nps-title-row { display: flex; align-items: center; gap: var(--spacing-base-tight); }
    .nps-title { flex: 1; margin: 0; }
    .nps-desc { margin: 0; font-size: 14px; line-height: 1.6; color: var(--content-secondary); }
    .nps-icons { display: flex; align-items: center; gap: var(--spacing-extra-tight); }
    .nps-graph { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; }
    .nps-donut { position: relative; width: 128px; height: 128px; }
    .nps-donut canvas { position: absolute; inset: 0; }
    .nps-donut-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; pointer-events: none;
    }
    .nps-donut-value { font-size: 32px; font-weight: 600; line-height: 40px; letter-spacing: -0.02em; color: var(--content-base); }
    .nps-donut-label { font-size: 12px; font-weight: 500; line-height: 16px; color: var(--content-secondary); }
    .nps-rows { display: flex; flex-direction: column; gap: var(--spacing-tight); }
    .nps-row {
      box-sizing: border-box;
      display: flex; align-items: center; gap: var(--spacing-base);
      height: 48px; padding: 0 var(--spacing-base-tight);
      background: var(--bg-base);
      border: 1px solid var(--border-base);
      border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 500; line-height: 20px; color: var(--content-base);
    }
    .nps-row-cat { flex: 1; display: flex; align-items: center; gap: var(--spacing-tight); min-width: 0; }
    .nps-row-cat i { display: flex; width: 24px; height: 24px; flex-shrink: 0; }
    .nps-row.is-promoters .nps-row-cat i { color: var(--bg-distribution-agree); }
    .nps-row.is-passives .nps-row-cat i { color: var(--bg-distribution-neither-agree-disagree); }
    .nps-row.is-detractors .nps-row-cat i { color: var(--bg-distribution-disagree); }
    .nps-row-pct { width: 40px; text-align: right; }
    .nps-row-count { display: flex; align-items: center; gap: var(--spacing-tight); color: var(--content-secondary); }
    .nps-row-count span { width: 48px; text-align: right; }
    .nps-row-count i { display: flex; width: 16px; height: 16px; color: var(--content-base); }

    /* ════ Themes (spiderweb) ════ */
    .sw-card { align-items: center; justify-content: space-between; }
    .sw-header { display: flex; align-items: center; gap: var(--spacing-base-tight); width: 100%; }
    .sw-title { flex: 1; margin: 0; }
    .sw-icons { display: flex; align-items: center; gap: var(--spacing-extra-tight); }
    .sw-graph { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; }
    .sw-legend { display: flex; align-items: center; justify-content: center; gap: var(--spacing-loose); }
    .sw-legend-item {
      display: flex; align-items: center; gap: var(--spacing-tight);
      font-size: 12px; font-weight: 500; line-height: 16px; color: var(--content-base);
    }
    .sw-legend-dot { width: 8px; height: 8px; border-radius: var(--radius-full); }
    .sw-legend-dot.is-current { background: var(--bg-results-current); }
    .sw-legend-dot.is-previous { background: var(--bg-results-previous); }

    /* ════ Response rate ════ */
    .rr-header { display: flex; align-items: center; gap: var(--spacing-base-tight); }
    .rr-title { flex: 1; margin: 0; }
    .rr-icons { display: flex; align-items: center; gap: var(--spacing-extra-tight); }
    .rr-body {
      position: relative;
      flex: 1;
      min-height: 0;
      border: 1px solid var(--border-base);
      border-radius: var(--radius-sm);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: var(--spacing-base);
      padding: var(--spacing-extra-loose) var(--spacing-loose) var(--spacing-super-loose);
    }
    .rr-gauge { position: relative; width: 136px; height: 136px; }
    .rr-gauge canvas { position: absolute; inset: 0; }
    .rr-gauge-value {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 600; letter-spacing: -0.02em;
      color: var(--content-base);
      pointer-events: none;
    }
    .rr-participants { font-size: 12px; font-weight: 600; line-height: 16px; color: var(--content-info-secondary); }
    .rr-participants b { font-weight: 600; color: var(--content-info-base); }
    .rr-trend {
      position: absolute;
      right: var(--spacing-base); bottom: var(--spacing-base-tight);
      display: flex; align-items: center; gap: var(--spacing-extra-tight);
      padding: 2px var(--spacing-extra-tight);
      background: var(--bg-base);
      border: 1px solid var(--border-positive-base);
      border-radius: var(--radius-sm);
      font-size: 12px; font-weight: 500; line-height: 16px;
      color: var(--content-positive-base);
    }
    .rr-trend i { display: flex; width: 16px; height: 16px; }
    .rr-bench { display: flex; flex-direction: column; gap: var(--spacing-tight); }
    .rr-bench-row {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 14px; font-weight: 500; line-height: 20px; color: var(--content-base);
    }
    .rr-bench-track { height: 8px; background: var(--bg-tertiary); border-radius: var(--radius-full); overflow: hidden; }
    .rr-bench-fill { height: 100%; background: var(--bg-results-benchmark); border-radius: var(--radius-full); }

    /* ════ Workload / Retention / Well-being ════ */
    .kpi-stack {
      box-sizing: border-box;
      width: 100%;
      max-width: 384px;
      height: 456px;
      display: flex;
      flex-direction: column;
      gap: var(--spacing-tight);
    }
    .kpi-card {
      box-sizing: border-box;
      flex: 1;
      min-height: 0;
      background: var(--bg-base);
      border: 1px solid var(--border-base);
      border-radius: var(--radius-md);
      box-shadow: var(--sh-card);
      padding: var(--spacing-loose);
      display: flex;
      align-items: center;
      gap: var(--spacing-base);
    }
    .kpi-text { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: var(--spacing-extra-tight); }
    .kpi-title-row { display: flex; align-items: center; gap: var(--spacing-tight); }
    .kpi-title { margin: 0; }
    .kpi-icons { display: flex; align-items: center; }
    .kpi-desc { margin: 0; font-size: 14px; line-height: 20px; color: var(--content-secondary); }
    .kpi-gauge { position: relative; width: 72px; height: 72px; flex-shrink: 0; }
    .kpi-gauge canvas { position: absolute; inset: 0; }
    .kpi-gauge-value {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 600; line-height: 27px;
      color: var(--content-base);
      pointer-events: none;
    }

    /* ════ Feel-good topics ════ */
    .tp-header { display: flex; flex-direction: column; gap: var(--spacing-extra-tight); }
    .tp-title-row { display: flex; align-items: center; gap: var(--spacing-base-tight); }
    .tp-title { flex: 1; margin: 0; }
    .tp-desc { margin: 0; font-size: 14px; line-height: 1.6; color: var(--content-secondary); }
    .tp-icons { display: flex; align-items: center; gap: var(--spacing-extra-tight); }
    .tp-list { flex: 1; display: flex; flex-direction: column; gap: var(--spacing-base-tight); min-height: 0; }
    .tp-tile {
      position: relative;
      display: flex; flex-direction: column; justify-content: center; gap: 2px;
      padding: var(--spacing-base) var(--spacing-super-loose) var(--spacing-base) var(--spacing-base);
      background: var(--bg-secondary);
      border-radius: var(--radius-base);
      overflow: hidden;
      cursor: pointer;
      border: 0;
      text-align: left;
      font-family: inherit;
      width: 100%;
    }
    .tp-tile-fill {
      position: absolute;
      inset: 0 auto 0 0;
      border: 2px solid var(--border-white);
      border-radius: var(--radius-base);
    }
    .tp-tile.is-green .tp-tile-fill { background: var(--bg-accent-green-subtle); }
    .tp-tile.is-turquoise .tp-tile-fill { background: var(--bg-accent-turquoise-subtle); }
    .tp-tile.is-blue .tp-tile-fill { background: var(--bg-accent-blue-subtle); }
    .tp-tile-name {
      position: relative; margin: 0;
      font-size: 14px; font-weight: 600; line-height: 1.6;
      color: var(--content-base);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tp-tile-meta {
      position: relative;
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; line-height: 1.6; color: var(--content-base);
    }
    .tp-tile-meta i { display: flex; width: 14px; height: 14px; flex-shrink: 0; }
    .tp-tile-chevron {
      position: absolute; right: var(--spacing-base-tight); top: 50%;
      transform: translateY(-50%);
      display: flex; width: 16px; height: 16px;
      color: var(--content-base);
    }
    .tp-footer { margin-top: auto; }
    .tp-footer .btn-link i { display: flex; width: 16px; height: 16px; }

    /* ════ Highest / Lowest scores ════ */
    .qs-header { display: flex; align-items: center; gap: var(--spacing-base); }
    .qs-illu { width: 32px; height: 32px; flex-shrink: 0; }
    .qs-title { flex: 1; margin: 0; }
    .qs-icons { display: flex; align-items: center; gap: var(--spacing-extra-tight); }
    .qs-rows { display: flex; flex-direction: column; }
    .qs-row {
      display: flex; align-items: center; gap: var(--spacing-tight);
      padding: var(--spacing-base) 0;
      border-top: 1px solid var(--border-base);
    }
    .qs-row-q { flex: 1; margin: 0; font-size: 14px; line-height: 1.6; color: var(--content-secondary); }
    .qs-row-score {
      width: 48px; height: 24px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 600; line-height: 1.6;
    }
    .qs-card.is-high .qs-row-score { background: var(--bg-positive-subtle); color: var(--content-positive-secondary); }
    .qs-card.is-low .qs-row-score { background: var(--bg-warning-subtle); color: var(--content-warning-secondary); }

    /* ════════════════════════════════════════════════
       Effectiveness side panel (opens on card click)
       ════════════════════════════════════════════════ */
    .overlay[hidden] { display: none; }
    .card.fx-card { cursor: pointer; transition: box-shadow var(--motion-base) var(--ease-out); }
    .card.fx-card:hover { box-shadow: var(--sh-card-hover); }

    .efp-tabs .sp-tab i[data-icon] { width: 16px; height: 16px; }

    .efp-lead { margin-bottom: var(--spacing-loose); }
    .efp-lead-title { margin: 0 0 var(--spacing-tight); font-size: 20px; font-weight: 600; line-height: 28px; color: var(--content-base); }
    .efp-lead-desc { margin: 0; font-size: 14px; line-height: 1.6; color: var(--content-secondary); }

    .efp-controls {
      display: flex; align-items: center; justify-content: space-between;
      gap: var(--spacing-base); margin-bottom: var(--spacing-base);
    }

    /* Comparisons filter dropdown */
    .efp-filter-wrap { position: relative; }
    .efp-filter {
      position: absolute; top: calc(100% + 6px); left: 0; z-index: 50;
      min-width: 240px; box-sizing: border-box;
      background: var(--bg-base); border: 1px solid var(--border-base);
      border-radius: var(--radius-md); box-shadow: var(--sh-popovers);
      padding: var(--spacing-tight);
      display: flex; flex-direction: column;
    }
    .efp-filter[hidden] { display: none; }
    .efp-filter-row {
      display: flex; align-items: center; gap: var(--spacing-tight);
      padding: var(--spacing-tight);
      border-radius: var(--radius-sm); cursor: pointer;
    }
    .efp-filter-row:hover { background: var(--bg-base-hover); }
    .efp-filter-label { flex: 1; min-width: 0; font-size: 14px; line-height: 1.6; color: var(--content-base); }
    .efp-filter-row > i[data-icon] { display: flex; width: 16px; height: 16px; color: var(--content-secondary); flex-shrink: 0; }

    /* Matrix */
    /* The matrix fills the full content width (aligned with the rest of the
       panel); the y-axis label is pulled out into the side-panel padding. */
    .efp-matrix-row { position: relative; margin-bottom: var(--spacing-tight); }
    .efp-y-axis {
      position: absolute; left: -24px; top: 0; bottom: 0; width: 20px;
      display: flex; align-items: center; justify-content: center;
    }
    .efp-y-axis span {
      writing-mode: vertical-rl; transform: rotate(180deg);
      font-size: 12px; font-weight: 500; color: var(--content-secondary); white-space: nowrap;
    }
    .efp-matrix {
      position: relative;
      height: 450px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: var(--spacing-extra-tight);
    }
    .efp-quad {
      position: relative;
      padding: var(--spacing-base-tight);
      font-size: 12px; font-weight: 600; line-height: 1.6;
    }
    .efp-quad-lbl { position: absolute; }
    .efp-quad.is-detached { background: var(--bg-tertiary); color: var(--content-secondary); border-top-left-radius: var(--radius-lg); }
    .efp-quad.is-detached .efp-quad-lbl { top: var(--spacing-base-tight); left: 50%; transform: translateX(-50%); }
    .efp-quad.is-effective { background: var(--bg-accent-green-subtle); color: var(--content-accent-green-base); border-top-right-radius: var(--radius-lg); }
    .efp-quad.is-effective .efp-quad-lbl { top: var(--spacing-base-tight); left: 50%; transform: translateX(-50%); }
    .efp-quad.is-ineffective { background: var(--bg-accent-red-subtle); color: var(--content-accent-red-base); border-bottom-left-radius: var(--radius-lg); }
    .efp-quad.is-ineffective .efp-quad-lbl { bottom: var(--spacing-base-tight); left: 50%; transform: translateX(-50%); }
    .efp-quad.is-not-utilized { background: var(--bg-accent-yellow-subtle); color: var(--content-accent-yellow-base); border-bottom-right-radius: var(--radius-lg); }
    .efp-quad.is-not-utilized .efp-quad-lbl { bottom: var(--spacing-base-tight); left: 50%; transform: translateX(-50%); }

    .efp-scale {
      position: absolute; font-size: 12px; font-weight: 500; color: var(--content-secondary);
      padding: var(--spacing-extra-tight) var(--spacing-tight); z-index: 3;
    }
    .efp-scale.is-tl { top: 0; left: 0; }
    .efp-scale.is-bl { bottom: 0; left: 0; }
    .efp-scale.is-br { bottom: 0; right: 0; }
    .efp-bench-badge {
      position: absolute; bottom: var(--spacing-tight); left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: var(--spacing-extra-tight);
      padding: var(--spacing-extra-tight) var(--spacing-tight);
      background: var(--bg-brand-base); color: var(--content-on-brand-base);
      border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; z-index: 4;
    }
    .efp-bench-badge i { display: flex; width: 14px; height: 14px; }
    .efp-bench-badge.is-left { left: var(--spacing-tight); right: auto; bottom: auto; top: 50%; transform: translateY(-50%); }
    .efp-bench-badge { cursor: default; }
    .efp-bench-badge .tooltip {
      position: absolute; left: 50%; bottom: calc(100% + 8px); transform: translateX(-50%);
      opacity: 0; pointer-events: none; white-space: nowrap; z-index: 10;
      transition: opacity var(--motion-fast) var(--ease-out);
    }
    .efp-bench-badge:hover .tooltip { opacity: 1; }

    .efp-marker { position: absolute; transform: translate(-50%, -50%); z-index: 2; }
    .efp-dot {
      width: 12px; height: 12px; border-radius: var(--radius-full);
      border: 2px solid var(--border-white); box-sizing: border-box;
      box-shadow: var(--sh-action);
    }
    .efp-chip {
      position: absolute; left: 50%; bottom: calc(100% + 6px); transform: translateX(-50%);
      display: flex; align-items: center; gap: 6px;
      padding: var(--spacing-extra-tight) var(--spacing-tight);
      border-radius: var(--radius-base); border: 2px solid var(--border-white);
      box-shadow: var(--sh-card-hover);
      font-size: 12px; font-weight: 500; line-height: 1.6; white-space: nowrap;
    }
    .efp-chip i { display: flex; width: 12px; height: 12px; flex-shrink: 0; }
    .efp-marker.is-org .efp-dot,
    .efp-marker.is-peer .efp-dot { background: var(--content-secondary); }
    .efp-marker.is-org .efp-chip { background: var(--bg-tertiary); color: var(--content-base); }
    .efp-marker.is-peer .efp-chip { background: var(--bg-secondary); color: var(--content-base); }
    .efp-marker.is-current .efp-dot { background: var(--content-info-secondary); }
    .efp-marker.is-current .efp-chip { background: var(--bg-info-base-hover); color: var(--content-inverse-base); }
    .efp-marker.is-previous .efp-dot { background: var(--content-info-base); }
    .efp-marker.is-previous .efp-chip { background: var(--bg-info-subtle); color: var(--content-info-base); }

    /* Hover: dot + chip take on the quadrant colour, marker lifts forward */
    .efp-marker { cursor: pointer; }
    .efp-marker:hover { z-index: 30; }
    .efp-marker:hover .efp-dot { background: var(--q); transform: scale(1.3); }
    .efp-marker:hover .efp-chip { background: var(--qs); color: var(--content-base); box-shadow: var(--sh-card-hover); }
    .efp-dot, .efp-chip { transition: transform var(--motion-fast) var(--ease-out), background var(--motion-fast) var(--ease-out), color var(--motion-fast) var(--ease-out); }

    /* Hover tooltip with the group's scores */
    .efp-tip {
      position: absolute; left: 50%; bottom: calc(100% + 42px); top: auto; transform: translateX(-50%);
      z-index: 40; width: 209px; box-sizing: border-box;
      display: flex; gap: var(--spacing-base-tight); align-items: stretch;
      padding: var(--spacing-base-tight);
      background: var(--bg-base); border: 1px solid var(--border-base);
      border-radius: var(--radius-lg); box-shadow: var(--sh-dialogs);
      text-align: left; cursor: default;
      opacity: 0; pointer-events: none;
      transition: opacity var(--motion-fast) var(--ease-out);
    }
    .efp-marker.tip-below .efp-tip { top: calc(100% + 8px); bottom: auto; }
    .efp-marker:hover .efp-tip { opacity: 1; }
    .efp-tip-bar { flex-shrink: 0; width: 4px; border-radius: var(--radius-full); background: var(--q); align-self: stretch; }
    .efp-tip-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: var(--spacing-tight); }
    .efp-tip-head { display: flex; flex-direction: column; gap: 2px; }
    .efp-tip-eyebrow { display: flex; align-items: center; gap: var(--spacing-extra-tight); font-size: 12px; font-weight: 500; color: var(--content-secondary); }
    .efp-tip-eyebrow i { display: flex; width: 12px; height: 12px; }
    .efp-tip-name { font-size: 14px; font-weight: 600; line-height: 22px; color: var(--content-base); }
    .efp-tip-rows { display: flex; flex-direction: column; gap: var(--spacing-extra-tight); }
    .efp-tip-row { display: flex; align-items: center; justify-content: space-between; gap: var(--spacing-tight); }
    .efp-tip-row span { font-size: 12px; font-weight: 500; color: var(--content-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .efp-tip-row b { flex-shrink: 0; font-size: 12px; font-weight: 600; color: var(--content-base); }

    .efp-x-axis { text-align: center; font-size: 12px; font-weight: 500; color: var(--content-secondary); }

    /* Section heading shared */
    .efp-section { margin-top: var(--spacing-super-loose); }
    .efp-section-title { margin: 0 0 var(--spacing-tight); font-size: 18px; font-weight: 600; line-height: 27px; color: var(--content-base); }
    .efp-section-lead { margin: 0 0 var(--spacing-base); font-size: 14px; line-height: 1.6; color: var(--content-secondary); }
    .efp-section p { color: var(--content-secondary); font-size: 14px; line-height: 1.6; }
    .efp-focus-list { margin: var(--spacing-base) 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: var(--spacing-base-tight); }
    .efp-focus-list li { font-size: 14px; line-height: 1.6; color: var(--content-secondary); }
    .efp-focus-list strong { color: var(--content-base); font-weight: 600; }

    /* Scores table */
    .efp-scores-head { display: flex; align-items: center; justify-content: space-between; gap: var(--spacing-base); margin-bottom: var(--spacing-tight); }
    .efp-feedback {
      display: flex; align-items: center; gap: var(--spacing-tight);
      padding: var(--spacing-tight) var(--spacing-base-tight);
      background: var(--bg-secondary); border: 1px solid var(--border-base);
      border-radius: var(--radius-md); font-size: 12px; font-weight: 500; color: var(--content-secondary);
    }
    .efp-feedback .ib { color: var(--content-secondary); }
    .efp-score-row {
      display: flex; align-items: center; gap: var(--spacing-base);
      padding: var(--spacing-base) 0;
      border-top: 1px solid var(--border-base);
    }
    .efp-score-row.is-sub { padding-left: var(--spacing-loose); }
    .efp-score-meta { flex: 1; min-width: 0; }
    .efp-score-name { font-size: 14px; font-weight: 600; line-height: 22px; color: var(--content-base); }
    .efp-score-row.is-sub .efp-score-name { font-weight: 500; }
    .efp-score-desc { font-size: 12px; line-height: 19px; color: var(--content-secondary); }
    .efp-score-badge {
      flex-shrink: 0; width: 48px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
    }
    .efp-score-badge.is-current { background: var(--bg-info-base); color: var(--content-inverse-base); }
    .efp-score-row.is-sub .efp-score-badge.is-current { background: var(--bg-info-subtle); color: var(--content-info-base); }
    .efp-score-badge.is-bench { background: var(--bg-scores-negative); color: var(--content-accent-red-base); }
    .efp-score-badge.is-bench-pos { background: var(--bg-scores-positive); color: var(--content-accent-green-base); }
    .efp-score-badge.is-bench-neg { background: var(--bg-scores-very-negative); color: var(--content-accent-red-base); }
    .efp-score-badge.is-bench-neutral { background: var(--bg-info-subtle); color: var(--content-info-base); }
    .efp-scores-intro { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--spacing-base); }
    .efp-score-cols { display: flex; gap: var(--spacing-base); flex-shrink: 0; }
    .efp-col-icon { width: 48px; display: flex; align-items: center; justify-content: center; }
    .efp-col-icon i { display: flex; width: 18px; height: 18px; color: var(--content-secondary); }
    .efp-col-icon.is-group i { color: var(--content-info-base); }
    .efp-lead-em { text-decoration: underline; text-decoration-thickness: 3px; text-decoration-color: var(--bg-accent-red-subtle); text-underline-offset: 4px; }

    /* Legend */
    .efp-legend-item { display: flex; gap: var(--spacing-base-tight); padding: var(--spacing-base-tight) 0; }
    .efp-legend-dot { flex-shrink: 0; width: 12px; height: 12px; border-radius: var(--radius-full); margin-top: 5px; }
    .efp-legend-dot.is-effective { background: var(--bg-accent-green-subtle); }
    .efp-legend-dot.is-ineffective { background: var(--bg-accent-red-subtle); }
    .efp-legend-dot.is-not-utilized { background: var(--bg-accent-yellow-subtle); }
    .efp-legend-dot.is-detached { background: var(--bg-tertiary); }
    .efp-legend-name { font-size: 14px; font-weight: 600; color: var(--content-base); }
    .efp-legend-desc { font-size: 14px; line-height: 1.6; color: var(--content-secondary); }

    /* ════════════════════════════════════════════════
       Engagement tile (score + benchmark)
       ════════════════════════════════════════════════ */
    .card.eng-card { cursor: pointer; gap: var(--spacing-base); transition: box-shadow var(--motion-base) var(--ease-out); }
    .card.eng-card:hover { box-shadow: var(--sh-card-hover); }
    .eng-header { display: flex; flex-direction: column; gap: var(--spacing-extra-tight); }
    .eng-title-row { display: flex; align-items: center; gap: var(--spacing-base-tight); }
    .eng-title { flex: 1; margin: 0; }
    .eng-subtitle { margin: 0; font-size: 14px; line-height: 1.6; color: var(--content-secondary); }
    .eng-icons { display: flex; align-items: center; gap: var(--spacing-extra-tight); }
    .eng-icons .tooltip { opacity: 0; pointer-events: none; transition: opacity var(--motion-fast) var(--ease-out); }
    .eng-icons .tt-demo:hover .tooltip, .eng-icons .tt-demo:focus-within .tooltip { opacity: 1; }
    .eng-body {
      position: relative; flex: 1; min-height: 0; overflow: hidden;
      border: 1px solid var(--border-base); border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
    }
    .eng-wave { position: absolute; left: 0; right: 0; bottom: -1px; width: 100%; height: 136px; display: block; }
    .eng-value {
      position: relative; z-index: 1;
      font-size: 42px; font-weight: 600; letter-spacing: -0.03em; line-height: 1.5;
      color: var(--content-positive-base);
    }
    .eng-trend {
      position: absolute; z-index: 2;
      right: var(--spacing-base-tight); bottom: var(--spacing-base-tight);
      display: flex; align-items: center; gap: var(--spacing-extra-tight);
      padding: 2px var(--spacing-extra-tight);
      background: var(--bg-base); border: 1px solid var(--border-positive-base);
      border-radius: var(--radius-sm); font-size: 12px; font-weight: 500; color: var(--content-positive-base);
    }
    .eng-trend i { display: flex; width: 16px; height: 16px; }
    .eng-bench { display: flex; flex-direction: column; gap: var(--spacing-tight); }
    .eng-bench-row {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 14px; font-weight: 500; line-height: 20px; color: var(--content-base);
    }
    .eng-bench-track { height: 8px; background: var(--border-base); border-radius: var(--radius-full); overflow: hidden; }
    .eng-bench-fill { height: 100%; background: var(--bg-results-benchmark); border-radius: var(--radius-full); }

    /* Distribution bar (shared by tile + panel) */
    .dist-ends { display: flex; align-items: center; justify-content: space-between; }
    .dist-end { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; }
    .dist-end i { display: flex; width: 16px; height: 16px; }
    .dist-end.is-dis { color: var(--bg-distribution-strongly-disagree); }
    .dist-end.is-eng { color: var(--content-positive-base); }
    .dist-bar { display: flex; height: 32px; border-radius: var(--radius-sm); overflow: hidden; }
    .dist-seg { display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--content-inverse-base); }
    .dist-seg.is-dis { background: var(--bg-distribution-strongly-disagree); }
    .dist-seg.is-pot { background: var(--bg-distribution-neither-agree-disagree); }
    .dist-seg.is-eng { background: var(--bg-distribution-strongly-agree); }
    .eng-dist { display: flex; flex-direction: column; gap: var(--spacing-tight); }

    /* ════════════════════════════════════════════════
       Engagement side panel
       ════════════════════════════════════════════════ */
    .engp-tabs .sp-tab i[data-icon] { width: 16px; height: 16px; }
    .engp-tab-count {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 18px; height: 18px; padding: 0 5px;
      background: var(--bg-info-base); color: var(--content-inverse-base);
      border-radius: var(--radius-full); font-size: 12px; font-weight: 600;
    }
    .engp-section { margin-top: var(--spacing-super-loose); }
    .engp-section:first-child { margin-top: 0; }
    .engp-section-title { margin: 0 0 var(--spacing-tight); font-size: 18px; font-weight: 600; line-height: 27px; color: var(--content-base); display: flex; align-items: center; gap: var(--spacing-tight); }
    .engp-section-title i { display: flex; width: 18px; height: 18px; }
    .engp-section p { margin: 0; font-size: 14px; line-height: 1.6; color: var(--content-secondary); }
    .engp-section p + .engp-dist, .engp-section p + .engp-cards, .engp-section p + .engp-chart-card { margin-top: var(--spacing-base); }

    .engp-dist { display: flex; flex-direction: column; gap: var(--spacing-tight); }

    .engp-cards { display: grid; grid-auto-flow: column; grid-auto-columns: 1fr; gap: var(--spacing-base); }
    .engp-card-item { background: var(--bg-info-subtle); border-radius: var(--radius-md); padding: var(--spacing-base); }
    .engp-card-lbl { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--content-secondary); }
    .engp-card-val { margin-top: var(--spacing-tight); font-size: 32px; font-weight: 600; line-height: 38px; color: var(--content-info-secondary); }

    .engp-chart-card { background: var(--bg-info-subtle); border-radius: var(--radius-md); padding: var(--spacing-base); }
    .engp-chart-hd { display: flex; align-items: center; gap: var(--spacing-tight); font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--content-secondary); margin-bottom: var(--spacing-base); }
    .engp-chart-hd .engp-chart-dot { width: 6px; height: 6px; border-radius: var(--radius-full); background: var(--bg-info-base); }
    .engp-chart-wrap { position: relative; height: 280px; }

    .engp-q-row {
      display: flex; align-items: center; gap: var(--spacing-base);
      padding: var(--spacing-base-tight) 0; border-top: 1px solid var(--border-base);
    }
    .engp-q-num {
      flex-shrink: 0; width: 20px; text-align: center;
      font-size: 14px; font-weight: 600; color: var(--content-subtle);
    }
    .engp-q-text { flex: 1; min-width: 0; font-size: 14px; line-height: 1.6; color: var(--content-secondary); }
    .engp-q-score {
      flex-shrink: 0; min-width: 44px; height: 28px; padding: 0 var(--spacing-tight);
      display: flex; align-items: center; justify-content: center;
      background: var(--bg-info-subtle); border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 600; color: var(--content-info-base);
    }
    .engp-section-head { display: flex; align-items: baseline; justify-content: space-between; gap: var(--spacing-base); margin-bottom: var(--spacing-tight); }
    .engp-grouplbl { font-size: 14px; font-weight: 500; color: var(--content-secondary); white-space: nowrap; }

    /* ════════════════════════════════════════════════
       AI Summary (collapsible, above the grid)
       ════════════════════════════════════════════════ */
    .ai-summary {
      max-width: 1200px; margin: 0 auto var(--spacing-loose);
      background: var(--bg-base);
      border: 1px solid var(--border-info-subtle);
      border-radius: var(--radius-lg);
      box-shadow: var(--sh-card);
      padding: var(--spacing-loose);
    }
    .ai-head { display: flex; align-items: center; gap: var(--spacing-base-tight); margin-bottom: var(--spacing-base); }
    .ai-head-left { display: flex; align-items: center; gap: var(--spacing-tight); flex: 1; }
    .ai-spark { display: flex; width: 22px; height: 22px; color: var(--content-info-secondary); }
    .ai-title { margin: 0; font-size: 20px; font-weight: 600; line-height: 28px; color: var(--content-info-secondary); }
    .ai-beta {
      display: inline-flex; align-items: center; padding: 2px var(--spacing-tight);
      background: var(--bg-info-subtle); color: var(--content-info-base);
      border-radius: var(--radius-full); font-size: 12px; font-weight: 500; line-height: 16px;
    }
    .ai-head-right { display: flex; align-items: center; gap: var(--spacing-extra-tight); }
    .ai-head-right .tooltip { opacity: 0; pointer-events: none; transition: opacity var(--motion-fast) var(--ease-out); }
    .ai-head-right .tt-demo:hover .tooltip, .ai-head-right .tt-demo:focus-within .tooltip { opacity: 1; }

    .ai-intro { margin: 0; font-size: 14px; line-height: 1.6; color: var(--content-secondary); }
    .ai-summary:not(.is-open) .ai-intro {
      display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden;
    }
    .ai-more { display: none; }
    .ai-summary.is-open .ai-more { display: block; }
    .ai-more > p { margin: var(--spacing-tight) 0 0; font-size: 14px; line-height: 1.6; color: var(--content-secondary); }

    .ai-sec { margin-top: var(--spacing-loose); }
    .ai-sec-title { margin: 0 0 var(--spacing-tight); font-size: 14px; font-weight: 600; line-height: 22px; color: var(--content-base); }
    .ai-list { margin: 0; padding-left: var(--spacing-base); display: flex; flex-direction: column; gap: var(--spacing-tight); }
    .ai-list li { font-size: 14px; line-height: 1.6; color: var(--content-secondary); }

    .ai-notice {
      display: flex; align-items: center; gap: var(--spacing-base); flex-wrap: wrap;
      margin-top: var(--spacing-loose); padding: var(--spacing-base-tight) var(--spacing-base);
      background: var(--bg-info-subtle); border-radius: var(--radius-md);
    }
    .ai-notice-text { flex: 1; min-width: 240px; display: flex; align-items: center; gap: var(--spacing-tight); font-size: 12px; color: var(--content-info-base); }
    .ai-notice-text i { display: flex; width: 16px; height: 16px; flex-shrink: 0; }
    .ai-notice-text a { color: var(--content-info-base); font-weight: 600; }
    .ai-notice-actions { display: flex; gap: var(--spacing-tight); }
    .ai-notice-actions .btn i { display: flex; width: 16px; height: 16px; }

    .ai-toggle {
      display: flex; align-items: center; justify-content: center; gap: var(--spacing-tight);
      width: 100%; margin-top: var(--spacing-base); padding: var(--spacing-tight) 0;
      border: 0; background: none; cursor: pointer;
      font-family: inherit; font-size: 14px; font-weight: 500; color: var(--content-base);
    }
    .ai-toggle i { display: flex; width: 16px; height: 16px; }
    .ai-summary:not(.is-open) .ai-toggle .ai-toggle-less,
    .ai-summary.is-open .ai-toggle .ai-toggle-more { display: none; }
    .ai-toggle-more, .ai-toggle-less { display: inline-flex; align-items: center; gap: var(--spacing-tight); }
    .efp-lead-em.is-pos { text-decoration-color: var(--bg-accent-green-subtle); }

    /* ════════════════════════════════════════════════
       Focus View (second tab)
       ════════════════════════════════════════════════ */
    #view-focus { display: flex; flex-direction: column; gap: var(--spacing-super-loose); }
    #view-focus[hidden], #view-overview[hidden] { display: none; }

    /* Top-right mini stats — sits 24px above the first section */
    .fv-stats {
      display: flex; justify-content: flex-end; gap: var(--spacing-tight); flex-wrap: wrap;
      margin-bottom: calc(-1 * (var(--spacing-super-loose) - var(--spacing-loose)));
    }
    .fv-stat-pill {
      display: inline-flex; align-items: center; gap: var(--spacing-tight);
      padding: var(--spacing-tight) var(--spacing-base-tight);
      background: var(--bg-base); border: 1px solid var(--border-base); border-radius: var(--radius-base);
      box-shadow: var(--sh-action);
    }
    .fv-stat-pill-lbl { font-size: 14px; font-weight: 600; color: var(--content-secondary); }
    .fv-stat-pill-val { font-size: 16px; font-weight: 600; color: var(--content-base); }
    .fv-stat-pill .fv-trend { font-size: 12px; }

    /* Trend (value + arrow-up) — shared by stat cards and mini stats */
    .fv-trend { display: inline-flex; align-items: center; gap: var(--spacing-extra-tight); font-size: 14px; font-weight: 500; color: var(--content-positive-base); white-space: nowrap; }
    .fv-trend i { display: flex; width: 14px; height: 14px; }
    .fv-trend-row { display: flex; align-items: center; gap: var(--spacing-extra-tight); }
    .fv-trend-note { font-size: 14px; font-weight: 500; color: var(--content-secondary); }

    /* Eyebrow pills */
    .fv-eyebrow {
      display: inline-flex; align-items: center; align-self: flex-start;
      padding: var(--spacing-extra-tight) var(--spacing-base-tight);
      border-radius: var(--radius-full);
      font-size: 12px; font-weight: 600; line-height: 18px; letter-spacing: 0.8px; text-transform: uppercase;
    }
    .fv-eyebrow.is-glance { background: var(--bg-info-base); color: var(--content-inverse-base); }
    .fv-eyebrow.is-focus { background: var(--bg-warning-bold); color: var(--content-inverse-base); }
    .fv-eyebrow.is-wins { background: var(--bg-positive-base); color: var(--content-inverse-base); }

    /* ──── At first glance ──── */
    .fv-glance {
      display: flex; flex-direction: column; gap: var(--spacing-extra-loose);
      padding: var(--spacing-super-extra-loose); background: var(--bg-secondary); border-radius: var(--radius-xl);
    }
    .fv-glance-head { display: flex; flex-direction: column; gap: var(--spacing-base); }
    .fv-glance-body { display: flex; justify-content: space-between; gap: var(--spacing-super-extra-loose); align-items: flex-start; }
    .fv-glance-left { flex: 0 1 517px; min-width: 0; display: flex; flex-direction: column; gap: var(--spacing-loose); }
    .fv-verdict { margin: 0; font-size: 32px; font-weight: 600; line-height: 38px; color: var(--content-base); }

    .fv-verdict.is-effective .fv-verdict-underline { background-color: var(--bg-positive-base); }
    .fv-verdict.is-ineffective .fv-verdict-underline { background-color: var(--bg-negative-base); }
    .fv-verdict.is-not-utilized .fv-verdict-underline { background-color: var(--bg-highlight-base); }
    .fv-verdict.is-detached .fv-verdict-underline { background-color: var(--border-action-hover); }

    .fv-stat-cards { display: flex; flex-direction: column; gap: var(--spacing-tight); }
    .fv-stat-card {
      display: flex; align-items: center; gap: var(--spacing-base);
      padding: var(--spacing-loose);
      background: var(--bg-base); border: 1px solid var(--bg-base-pressed); border-radius: var(--radius-md);
    }
    .fv-stat-text { flex: 1; display: flex; flex-direction: column; gap: var(--spacing-extra-tight); }
    .fv-stat-main { margin: 0; font-size: 20px; font-weight: 600; line-height: 28px; color: var(--content-base); }
    .fv-stat-val { color: var(--content-info-secondary); }
    .fv-explore {
      display: inline-flex; align-items: center; gap: var(--spacing-extra-tight);
      font-size: 14px; font-weight: 500; color: var(--content-base); cursor: pointer; white-space: nowrap;
    }
    .fv-explore i { display: flex; width: 16px; height: 16px; }

    .fv-meaning { margin-top: var(--spacing-extra-tight); }
    .fv-meaning-hd { display: flex; align-items: center; gap: var(--spacing-tight); font-size: 14px; font-weight: 600; color: var(--content-base); }
    .fv-meaning-hd i { display: flex; width: 16px; height: 16px; }
    .fv-meaning p { margin: var(--spacing-tight) 0 0; font-size: 14px; line-height: 1.6; color: var(--content-secondary); }

    .fv-glance-matrix { flex: none; width: 445px; max-width: 100%; display: flex; flex-direction: column; gap: var(--spacing-tight); }
    .fv-matrix-row { position: relative; }
    .fv-matrix-row .fx-matrix { width: 100%; height: 383px; }
    .fv-y-axis {
      position: absolute; left: calc(-1 * var(--spacing-extra-loose)); top: 0; height: 383px;
      display: flex; align-items: center; justify-content: center;
      writing-mode: vertical-rl; transform: rotate(180deg);
      font-size: 14px; line-height: 1.6; color: var(--content-secondary);
    }
    .fv-x-axis { margin: 0; font-size: 14px; line-height: 1.6; color: var(--content-secondary); text-align: center; }

    /* ──── Focus / Wins blocks ──── */
    .fv-block {
      display: grid; grid-template-columns: 339px 1fr; gap: var(--spacing-extra-loose);
      padding: var(--spacing-super-extra-loose); border-radius: var(--radius-xl);
    }
    .fv-focus { background: linear-gradient(115deg, #FFF6EA 17.95%, #FFEBE2 85.36%); }
    .fv-wins { background: linear-gradient(115deg, #F4FEF4 17.95%, #ECFFF2 85.36%); }
    .fv-block-aside { display: flex; flex-direction: column; gap: var(--spacing-base-tight); }
    .fv-block-main { display: flex; flex-direction: column; gap: var(--spacing-loose); }
    .fv-section-title { margin: 0; font-size: 26px; font-weight: 600; line-height: 31px; letter-spacing: -0.02em; color: var(--content-base); }
    .fv-section-desc { margin: 0; font-size: 14px; line-height: 1.6; color: var(--content-secondary); }
    .fv-why {
      display: inline-flex; align-items: center; gap: var(--spacing-extra-tight); align-self: flex-end;
      font-size: 14px; font-weight: 600; color: var(--content-secondary); cursor: pointer; white-space: nowrap;
    }
    .fv-why i { display: flex; width: 16px; height: 16px; }

    .fv-cards, .fv-win-cards { display: flex; flex-direction: column; gap: var(--spacing-base-tight); }

    /* Focus question card */
    .fv-card {
      display: flex; flex-direction: column; gap: var(--spacing-loose);
      padding: var(--spacing-loose); background: var(--bg-base);
      border: 1px solid var(--border-base); border-radius: var(--radius-lg);
    }
    .fv-card-head { display: flex; flex-direction: column; gap: var(--spacing-base-tight); }
    .fv-card-top { display: flex; align-items: flex-start; gap: var(--spacing-base-tight); }
    .fv-card-q { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: var(--spacing-extra-tight); }
    .fv-card-question { margin: 0; font-size: 14px; font-weight: 600; line-height: 22px; color: var(--content-base); }
    .fv-card .fv-card-question { font-size: 16px; line-height: 24px; }
    .fv-card-theme { font-size: 12px; line-height: 19px; color: var(--content-secondary); }
    .fv-score {
      flex-shrink: 0; min-width: 48px; display: inline-flex; align-items: center; justify-content: center;
      padding: var(--spacing-extra-tight) var(--spacing-tight);
      border-radius: var(--radius-base); font-size: 14px; font-weight: 600; line-height: 22px;
    }
    .fv-score.is-focus { background: var(--bg-warning-bold); color: var(--content-inverse-base); }
    .fv-score.is-win { background: var(--bg-positive-base); color: var(--content-inverse-base); }

    .fv-relevance { display: flex; flex-wrap: wrap; justify-content: flex-start; gap: var(--spacing-base); }
    .fv-rel-btn { display: inline-flex; align-items: center; gap: var(--spacing-extra-tight); font-size: 12px; font-weight: 500; color: var(--content-secondary); cursor: pointer; }
    .fv-rel-btn i { display: flex; width: 12px; height: 12px; }

    .fv-divider { height: 1px; width: 100%; background: var(--border-base); }

    .fv-approach { display: flex; flex-direction: column; gap: var(--spacing-base); }
    .fv-approach-lbl { display: flex; align-items: center; gap: var(--spacing-tight); font-size: 14px; font-weight: 400; color: var(--content-base); }
    .fv-approach-lbl i { display: flex; width: 20px; height: 20px; color: var(--content-highlight-secondary); }
    .fv-approach-chips { display: flex; flex-wrap: wrap; gap: var(--spacing-base-tight); }
    .fv-approach-chips .rb-btn-bordered.is-checked { background: var(--bg-brand-subtle); border-color: var(--border-brand-subtle); }

    .fv-reco {
      display: flex; flex-direction: column; gap: var(--spacing-base);
      padding: var(--spacing-loose); background: var(--bg-base);

    .fv-reco-effort {

       Responsiveness

    /* Tighter page padding once the wide desktop margin no longer fits */
    @media (max-width: 1100px) {

    }

    @media (max-width: 900px) {
      .mainnav { display: none; }

    @media (max-width: 768px) {

      .sidepanel { width: 100%; }

      .efp-matrix { height: 340px; }

    "These are the areas where your team is performing well. Share these wins with your team to keep the momentum going!": { nl: "Dit zijn de gebieden waarop je team goed presteert. Deel deze successen met je team om het momentum vast te houden!", de: "Das sind die Bereiche, in denen Ihr Team gut abschneidet. Teilen Sie diese Erfolge mit Ihrem Team, um das Momentum aufrechtzuerhalten!" },

    "Run a short team session on this theme": { nl: "Houd een korte teamsessie over dit thema", de: "Führen Sie eine kurze Teamsitzung zu diesem Thema durch" },
    "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Bring the team together to name what gets in the way, then agree on one concrete change to try over the next few weeks.": { nl: "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Breng het team samen om te benoemen wat in de weg zit en spreek vervolgens één concrete verandering af om de komende weken uit te proberen.", de: "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Bringen Sie das Team zusammen, um zu benennen, was im Weg steht, und vereinbaren Sie dann eine konkrete Änderung, die Sie in den nächsten Wochen ausprobieren." },
    "Ask each person where their strengths are underused": { nl: "Vraag elke medewerker waar hun sterke punten onderbenut blijven", de: "Fragen Sie jede Person, wo ihre Stärken zu wenig genutzt werden" },
    "Your team signalled their skills do not fully fit their roles. In your next 1:1s, ask what each person does best and where they feel stretched too thin — or not enough. Small adjustments to who owns what can close the fit gap surprisingly quickly.": { nl: "Je team gaf aan dat hun vaardigheden niet volledig aansluiten op hun rol. Vraag in je volgende 1-op-1-gesprekken waar iemand het best in is en waar diegene zich te dun uitgesmeerd voelt — of juist te weinig wordt uitgedaagd. Kleine aanpassingen in wie wat doet kunnen het verschil verrassend snel dichten.", de: "Ihr Team hat signalisiert, dass seine Fähigkeiten nicht ganz zu den Rollen passen. Fragen Sie in Ihren nächsten 1:1-Gesprächen, was jede Person am besten kann und wo sie sich zu dünn aufgestellt fühlt — oder zu wenig gefordert. Kleine Anpassungen, wer was übernimmt, können die Lücke überraschend schnell schließen." },
    "Adjust how work flows through the team": { nl: "Pas aan hoe het werk door het team stroomt", de: "Passen Sie an, wie die Arbeit durch das Team fließt" },
    "Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Review the current workflow and remove the step that adds the least value.": { nl: "Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Bekijk de huidige workflow en verwijder de stap die de minste waarde toevoegt.", de: "Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Überprüfen Sie den aktuellen Workflow und entfernen Sie den Schritt, der den geringsten Mehrwert bietet." },
    "Reflect on your own role in this theme": { nl: "Reflecteer op je eigen rol in dit thema", de: "Reflektieren Sie über Ihre eigene Rolle bei diesem Thema" },
    "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Take a moment to consider one small thing you can change in how you support the team this week.": { nl: "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sta even stil bij één kleine verandering die je deze week kunt doorvoeren in hoe je het team ondersteunt.", de: "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Überlegen Sie kurz, welche kleine Sache Sie diese Woche daran ändern können, wie Sie das Team unterstützen." },

    /* ── Themes radar axis labels ── */
    "Diversity": { nl: "Diversiteit", de: "Diversität" },
