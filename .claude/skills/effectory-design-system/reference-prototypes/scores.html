<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scores — Results dashboard</title>
  <base href="/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/tokens.css" />
  <link rel="stylesheet" href="/foundation.css" />
  <link rel="stylesheet" href="/components.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
  <style>
    body {
      background: var(--bg-interface-body);
      --results-side: calc(var(--spacing-extra-loose) * 2); /* 64px */
      --results-top: calc(var(--spacing-loose) * 2);        /* 48px */
    }
    .app { display: flex; height: 100vh; overflow: hidden; }
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .main-scroll { flex: 1; overflow-y: auto; }
    .breadcrumb { padding-left: var(--results-side); padding-right: var(--results-side); }
    .results-head { padding: var(--results-top) var(--results-side) 0; }
    .results-title { margin: 0 0 var(--spacing-base); cursor: pointer; width: fit-content; }
    .results-filters { display: flex; align-items: center; gap: var(--spacing-base); margin-bottom: var(--spacing-loose); }
    .date-range { display: flex; align-items: center; gap: var(--spacing-tight); cursor: pointer; color: var(--content-secondary); font-size: 14px; font-weight: 500; }
    .date-range i { color: var(--content-subtle); }
    .results-head .tabs { padding: 0 var(--results-side); margin: 0 calc(-1 * var(--results-side)); }
    .results-head .tab .tab-spark { width: 18px; height: 18px; color: var(--bg-highlight-base); }

    /* tooltips: hidden until hover/focus (positioned via the auto-position script) */
    .tt-demo { position: relative; display: inline-flex; }
    .tt-demo .tooltip { opacity: 0; pointer-events: none; transition: opacity var(--motion-fast) var(--ease-out); }
    .tt-demo:hover .tooltip, .tt-demo:focus-within .tooltip { opacity: 1; }

    /* full-width data view container (Scores) */
    .overview-wrap { max-width: 1248px; margin: 0 auto; padding: var(--results-top) var(--results-side) var(--spacing-super-extra-loose); }
    .overview-wrap.is-full { max-width: none; padding-left: var(--results-side); padding-right: var(--results-side); }

    /* shared section header */
    .rd-intro { display: flex; align-items: center; gap: var(--spacing-base); margin-bottom: var(--spacing-super-loose); }
    .rd-intro h2 { margin: 0; }
    .rd-bar { width: 3px; height: 32px; background: var(--bg-brand-base); border-radius: var(--radius-sm); flex: none; }
    .rd-sub { font-size: 16px; color: var(--content-secondary); }

    /* ════ Scores table ════ */
    .sc-toolbar { display: flex; align-items: center; gap: var(--spacing-base-tight); margin-bottom: var(--spacing-base); }
    .sc-search { flex: 1; min-width: 0; display: flex; align-items: center; gap: var(--spacing-tight); background: var(--bg-base); border: 1px solid var(--border-action); border-radius: var(--radius-base); padding: var(--spacing-tight) var(--spacing-base-tight); }
    .sc-search i { display: flex; width: 16px; height: 16px; color: var(--content-secondary); flex: none; }
    .sc-search-input { flex: 1; min-width: 0; border: 0; background: none; outline: none; font: inherit; font-size: 14px; color: var(--content-base); }
    .sc-search-input::placeholder { color: var(--content-placeholder); }
    .sc-filter-btn { display: flex; align-items: center; gap: var(--spacing-tight); height: 36px; padding: var(--spacing-extra-tight) var(--spacing-base-tight); background: var(--bg-base); border: 1px solid var(--border-action); border-radius: var(--radius-base); box-shadow: var(--sh-action); font-family: inherit; font-size: 14px; cursor: pointer; white-space: nowrap; }
    .sc-filter-btn:hover { border-color: var(--border-action-hover); }
    .sc-filter-btn i { display: flex; width: 16px; height: 16px; color: var(--content-secondary); }
    .sc-filter-lbl { font-weight: 600; color: var(--content-secondary); }
    .sc-filter-val { font-weight: 500; color: var(--content-base); }
    .sc-tb-divider { width: 1px; height: 24px; background: var(--border-base); flex: none; }
    .sc-reset { display: flex; align-items: center; justify-content: center; gap: var(--spacing-extra-tight); height: 36px; padding: var(--spacing-extra-tight) var(--spacing-base-tight); border: 0; border-radius: var(--radius-base); background: var(--bg-disabled); color: var(--content-disabled); font-family: inherit; font-size: 14px; font-weight: 500; white-space: nowrap; cursor: not-allowed; }
    .sc-reset i { display: flex; width: 16px; height: 16px; }

    .sc-table { width: 100%; overflow-x: auto; position: relative; }
    #view-scores .sc-table .tt-demo .tooltip { display: none; }
    #view-scores .sc-table .tt-demo:hover .tooltip, #view-scores .sc-table .tt-demo:focus-within .tooltip { display: block; }
    .sc-frozen-line { position: sticky; left: 380px; width: 1px; background: transparent; z-index: 3; pointer-events: none; transition: box-shadow var(--motion-base) var(--ease-out); }
    .sc-table.is-scrolled .sc-frozen-line { background: var(--border-base); box-shadow: 4px 0 8px -2px rgba(25, 39, 67, 0.10); }
    .sc-group { width: 100%; }
    .sc-group + .sc-group { margin-top: var(--spacing-super-loose); }
    .sc-head { display: flex; align-items: stretch; min-width: 100%; }
    .sc-head-title { flex: 1 1 380px; min-width: 380px; position: sticky; left: 0; z-index: 2; display: flex; align-items: center; gap: var(--spacing-extra-tight); padding: var(--spacing-base); background: var(--bg-base); border: 0; border-bottom: 1px solid var(--border-base); font-family: inherit; font-size: 16px; font-weight: 600; line-height: 24px; color: var(--content-base); cursor: pointer; text-align: left; }
    .sc-chev { display: flex; width: 16px; height: 16px; flex: none; transition: transform var(--motion-fast) var(--ease-out); }
    .sc-group[data-open="false"] .sc-chev { transform: rotate(-90deg); }
    .sc-group[data-open="false"] .sc-rows { display: none; }
    .sc-col-head { width: 140px; flex: none; display: flex; align-items: center; justify-content: flex-end; gap: var(--spacing-tight); padding: var(--spacing-base) var(--spacing-base-tight); border-bottom: 1px solid var(--border-base); font-size: 12px; font-weight: 500; color: var(--content-secondary); }
    .sc-col-head i { display: flex; width: 14px; height: 14px; flex: none; }
    .sc-col-lbl { display: block; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sc-rows { width: 100%; }
    .sc-row { display: flex; align-items: center; min-height: 56px; background: var(--bg-base); min-width: 100%; }
    .sc-row:hover { background: var(--bg-input-hover, var(--bg-secondary)); }
    .sc-q { flex: 1 1 380px; min-width: 380px; align-self: stretch; display: flex; align-items: center; position: sticky; left: 0; z-index: 2; background: var(--bg-base); border-bottom: 1px solid var(--border-base); padding: var(--spacing-tight) var(--spacing-base); font-size: 14px; line-height: 1.6; color: var(--content-base); cursor: pointer; }
    .sc-q-text { min-width: 0; }
    .sc-row:hover .sc-q { background: var(--bg-input-hover, var(--bg-secondary)); }
    .sc-actions { display: none; position: absolute; right: var(--spacing-base); top: 50%; transform: translateY(-50%); align-items: center; gap: var(--spacing-tight); padding-left: var(--spacing-base); background: inherit; }
    .sc-row:hover .sc-actions { display: flex; }
    .sc-insights { height: 36px; padding: var(--spacing-extra-tight) var(--spacing-base); }
    .sc-cell { width: 140px; flex: none; align-self: stretch; display: flex; align-items: center; padding: var(--spacing-extra-tight); border-bottom: 1px solid var(--border-base); }
    .sc-fill { flex: 1; min-width: 0; align-self: stretch; display: flex; align-items: center; justify-content: flex-end; padding: 0 var(--spacing-base-tight); border-radius: var(--radius-base); font-size: 14px; font-weight: 500; color: var(--content-base); }
    .sc-cell.is-vpos .sc-fill { background: var(--bg-scores-very-positive); }
    .sc-cell.is-pos .sc-fill { background: var(--bg-scores-positive); }
    .sc-cell.is-neg .sc-fill { background: var(--bg-scores-negative); }
    .sc-cell.is-vneg .sc-fill { background: var(--bg-scores-very-negative); }
    .sc-grp-age { display: none; }
    #view-scores.seg-age .sc-grp-age { display: flex; }
    .sc-col-head[data-col="org"], .sc-cell[data-col="org"] { display: none; }
    .sc-fill-na { justify-content: flex-end; color: var(--content-subtle); }
    .sc-fill-na i { display: flex; width: 16px; height: 16px; }

    /* Comparisons popover */
    .sc-cmp-wrap { position: relative; }
    .sc-pop { position: absolute; top: calc(100% + var(--spacing-tight)); right: 0; z-index: 60; width: 400px; max-width: 92vw; background: var(--bg-base); border: 1px solid var(--border-base); border-radius: var(--radius-lg); box-shadow: var(--sh-dialogs); padding: var(--spacing-loose); }
    .sc-pop[hidden] { display: none; }
    .sc-pop-view { display: flex; flex-direction: column; gap: var(--spacing-base); }
    .sc-pop-view[hidden] { display: none; }
    .sc-pop-sect { display: flex; flex-direction: column; gap: var(--spacing-tight); }
    .sc-pop-lbl { font-size: 12px; font-weight: 500; line-height: 1.6; color: var(--content-secondary); }
    .sc-quick { display: flex; flex-wrap: wrap; gap: var(--spacing-tight); }
    .sc-quick-chip { display: inline-flex; align-items: center; gap: var(--spacing-extra-tight); padding: var(--spacing-extra-tight) var(--spacing-base-tight); border: 1px solid var(--border-base); border-radius: var(--radius-full); background: var(--bg-base); font-family: inherit; font-size: 12px; font-weight: 500; color: var(--content-secondary); cursor: pointer; }
    .sc-quick-chip i { display: flex; width: 12px; height: 12px; }
    .sc-quick-chip.is-active { background: var(--bg-brand-base); border-color: var(--border-brand-base); color: var(--content-inverse-base); }
    .sc-pop-divider { height: 1px; background: var(--border-base); }
    .sc-pop-rows { display: flex; flex-direction: column; }
    .sc-pop-row { display: flex; align-items: center; gap: var(--spacing-base-tight); width: 100%; padding: var(--spacing-base-tight) var(--spacing-tight); border: 0; background: none; border-radius: var(--radius-base); font-family: inherit; font-size: 14px; color: var(--content-base); cursor: pointer; text-align: left; }
    .sc-pop-row:hover { background: var(--bg-base-hover); }
    .sc-pop-row > i:first-child { display: flex; width: 16px; height: 16px; color: var(--content-secondary); flex: none; }
    .sc-pop-row-name { flex: 1; min-width: 0; font-weight: 500; }
    .sc-pop-row-meta { color: var(--content-secondary); font-size: 12px; }
    .sc-pop-row-arrow { display: flex; width: 12px; height: 12px; color: var(--content-subtle); flex: none; }
    .sc-pop-head { display: flex; flex-direction: column; gap: var(--spacing-extra-tight); }
    .sc-pop-back { display: flex; align-items: center; gap: var(--spacing-extra-tight); border: 0; background: none; padding: 0; font-family: inherit; font-size: 16px; font-weight: 600; color: var(--content-base); cursor: pointer; }
    .sc-pop-back i { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: var(--radius-base); }
    .sc-pop-back i svg { width: 16px; height: 16px; }
    .sc-pop-sub { margin: 0; font-size: 12px; color: var(--content-secondary); }
    .sc-seg-list { display: flex; flex-direction: column; gap: var(--spacing-extra-tight); }
    .sc-seg { border-radius: var(--radius-base); }
    .sc-seg:not(.is-open):not(.is-selected):hover { background: var(--bg-base-hover); }
    .sc-seg.is-open, .sc-seg.is-selected { background: var(--bg-brand-subtle-selected); }
    .sc-seg-head { display: flex; align-items: flex-start; gap: var(--spacing-base-tight); padding: var(--spacing-base-tight) var(--spacing-tight); }
    .sc-seg-head .cb-wrap { margin-top: 3px; flex: none; }
    .sc-seg-cat .cb-wrap { flex: none; }
    .sc-seg-title { flex: 1; min-width: 0; display: flex; align-items: flex-start; gap: var(--spacing-base-tight); border: 0; background: none; padding: 0; font-family: inherit; cursor: pointer; text-align: left; }
    .sc-seg-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .sc-seg-name { display: block; font-size: 14px; font-weight: 500; color: var(--content-base); }
    .sc-seg-count { display: block; font-size: 12px; color: var(--content-secondary); }
    .sc-seg-note { color: var(--content-info-base); }
    .sc-seg-chev { display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; flex: none; color: var(--content-secondary); transition: transform var(--motion-fast) var(--ease-out); }
    .sc-seg-chev svg { width: 16px; height: 16px; }
    .sc-seg.is-open .sc-seg-chev { transform: rotate(180deg); }
    .sc-seg-cats { display: grid; grid-template-rows: 0fr; transition: grid-template-rows var(--motion-base) var(--ease-out); }
    .sc-seg.is-open .sc-seg-cats { grid-template-rows: 1fr; }
    .sc-seg-cats-inner { overflow: hidden; min-height: 0; }
    .sc-seg-cats-pad { display: flex; flex-direction: column; gap: var(--spacing-base-tight); padding: var(--spacing-base) var(--spacing-base) var(--spacing-base-tight) calc(var(--spacing-tight) + 16px + var(--spacing-base-tight)); }
    .sc-seg-cat { display: flex; align-items: flex-start; gap: var(--spacing-tight); font-size: 14px; font-weight: 500; color: var(--content-base); cursor: pointer; }
    .sc-seg-cat-name { flex: 1; min-width: 0; }
    .sc-seg-cat-n { color: var(--content-secondary); font-size: 12px; font-weight: 500; flex: none; }
    .sc-seg-cat.is-hidden .sc-seg-cat-n { color: var(--content-info-base); }
    .sc-seg-cat-hidden { display: flex; width: 14px; height: 14px; color: var(--content-secondary); flex: none; }

    /* Floating legend */
    .sc-legend {
      position: fixed; bottom: var(--spacing-loose); left: calc(50% + 120px); transform: translateX(-50%);
      transform-origin: bottom center;
      transition: transform var(--motion-base) var(--ease-out), box-shadow var(--motion-base) var(--ease-out);
      z-index: 50; display: flex; align-items: center; gap: var(--spacing-base);
      width: max-content; max-width: calc(100vw - var(--spacing-loose) * 2); white-space: nowrap;
      padding: var(--spacing-tight) var(--spacing-base);
      background: var(--bg-base); border: 1px solid var(--border-base);
      border-radius: var(--radius-full); box-shadow: var(--sh-dialogs);
      font-size: 12px; font-weight: 500; color: var(--content-base);
    }
    .sc-legend:hover { transform: translateX(-50%) scale(1.1); }
    .sc-legend.is-swapping { transform: translateX(-50%) translateY(160px); transition-timing-function: var(--ease-in); }
    .sc-legend-label { font-weight: 600; }
    .sc-legend-side.is-higher { color: var(--content-positive-base); }
    .sc-legend-side.is-lower { color: var(--content-negative-base); }
    .sc-legend-scale { display: flex; align-items: center; gap: var(--spacing-extra-tight); }
    .sc-legend-sw { min-width: 44px; text-align: center; padding: 2px var(--spacing-tight); border-radius: var(--radius-sm); }
    .sc-legend-sw.is-vpos { background: var(--bg-scores-very-positive); color: var(--content-positive-base); }
    .sc-legend-sw.is-pos { background: var(--bg-scores-positive); color: var(--content-positive-base); }
    .sc-legend-sw.is-neutral { background: var(--bg-base); border: 1px solid var(--border-base); }
    .sc-legend-sw.is-neg { background: var(--bg-scores-negative); color: var(--content-negative-base); }
    .sc-legend-sw.is-vneg { background: var(--bg-scores-very-negative); color: var(--content-negative-base); }
    .sc-legend-div { width: 1px; height: 20px; background: var(--border-base); }
    .sc-legend-sig { display: inline-flex; align-items: center; gap: var(--spacing-extra-tight); color: var(--content-secondary); }
    .sc-legend-star { color: var(--content-base); }

    /* ════ Question side panel (engagement-style) ════ */
    .engp-tabs .sp-tab i[data-icon] { width: 16px; height: 16px; }
    .engp-section { margin-top: var(--spacing-super-loose); }
    .engp-section:first-child { margin-top: 0; }
    .engp-section-title { margin: 0 0 var(--spacing-tight); font-size: 18px; font-weight: 600; line-height: 27px; color: var(--content-base); display: flex; align-items: center; gap: var(--spacing-tight); }
    .engp-section-title i { display: flex; width: 18px; height: 18px; }
    .engp-section p { margin: 0; font-size: 14px; line-height: 1.6; color: var(--content-secondary); }
    .engp-section p + .engp-dist, .engp-section p + .engp-cards, .engp-section p + .engp-chart-card { margin-top: var(--spacing-base); }
    .engp-dist { display: flex; flex-direction: column; gap: var(--spacing-tight); }
    .dist-ends { display: flex; align-items: center; justify-content: space-between; }
    .dist-end { display: flex; align-items: center; gap: var(--spacing-tight); font-size: 14px; font-weight: 600; line-height: 22px; }
    .dist-end i { display: flex; width: 24px; height: 24px; }
    .dist-end.is-dis { color: var(--content-negative-base); }
    .dist-end.is-eng { color: var(--content-positive-base); }
    .dist-bar { display: flex; gap: var(--spacing-extra-tight); height: 40px; }
    .dist-seg { display: flex; align-items: center; justify-content: center; min-width: 0; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; color: var(--content-inverse-base); }
    .dist-seg.is-sdis { background: var(--bg-distribution-strongly-disagree); }
    .dist-seg.is-disagree { background: var(--bg-distribution-disagree); }
    .dist-seg.is-neutral { background: var(--bg-distribution-neither-agree-disagree); color: var(--content-base); }
    .dist-seg.is-agree { background: var(--bg-distribution-agree); }
    .dist-seg.is-sagree { background: var(--bg-distribution-strongly-agree); }
    .scp-agree-row { display: flex; justify-content: flex-end; margin-top: var(--spacing-tight); }
    .scp-agree-bracket { position: relative; display: flex; align-items: center; justify-content: center; height: 16px; min-width: 0; }
    .scp-agree-bracket::before { content: ''; position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%); height: 2px; background: var(--bg-distribution-strongly-agree); }
    .scp-br-cap { position: absolute; top: calc(50% - 7px); width: 2px; height: 7px; background: var(--bg-distribution-strongly-agree); }
    .scp-br-cap.is-left { left: 0; }
    .scp-br-cap.is-right { right: 0; }
    .scp-br-lbl { position: relative; z-index: 1; background: var(--bg-base); padding: 0 var(--spacing-tight); font-size: 12px; font-weight: 500; color: var(--content-secondary); white-space: nowrap; }
    .engp-cards { display: grid; grid-auto-flow: column; grid-auto-columns: 1fr; gap: var(--spacing-base); }
    .engp-card-item { background: var(--bg-info-subtle); border-radius: var(--radius-md); padding: var(--spacing-base); }
    .engp-card-lbl { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--content-secondary); }
    .engp-card-val { margin-top: var(--spacing-tight); font-size: 32px; font-weight: 600; line-height: 38px; color: var(--content-info-secondary); }
    .engp-chart-card { background: var(--bg-info-subtle); border-radius: var(--radius-md); padding: var(--spacing-base); }
    .engp-chart-hd { display: flex; align-items: center; gap: var(--spacing-tight); font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--content-secondary); margin-bottom: var(--spacing-base); }
    .engp-chart-hd .engp-chart-dot { width: 6px; height: 6px; border-radius: var(--radius-full); background: var(--bg-info-base); }
    .engp-chart-wrap { position: relative; height: 280px; }
    .engp-q-row { display: flex; align-items: center; gap: var(--spacing-base); padding: var(--spacing-base-tight) 0; border-top: 1px solid var(--border-base); }
    .engp-q-text { flex: 1; min-width: 0; font-size: 14px; line-height: 1.6; color: var(--content-secondary); }
    .engp-q-score { flex-shrink: 0; min-width: 44px; height: 28px; padding: 0 var(--spacing-tight); display: flex; align-items: center; justify-content: center; background: var(--bg-info-subtle); border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; color: var(--content-info-base); }
    .scp-theme-tag { display: inline-flex; align-items: center; padding: 2px var(--spacing-tight); background: var(--bg-tertiary); border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; line-height: 16px; color: var(--content-secondary); text-transform: uppercase; letter-spacing: 0.02em; }
    .scp-tips { margin: var(--spacing-tight) 0 0; padding-left: var(--spacing-loose); display: flex; flex-direction: column; gap: var(--spacing-base-tight); }
    .scp-tips li { font-size: 14px; line-height: 1.6; color: var(--content-base); }
    .scp-bp { margin: 0; font-size: 14px; line-height: 1.6; color: var(--content-secondary); }

    @media (max-width: 1199px) { .mainnav { display: none; } }
  </style>
</head>
<body>

<div class="app">
  <div class="mainnav">
    <div class="mn-portal">
      <span class="mn-logo"></span>
      <button class="mn-portal-btn"><b>Coordinator</b> <i data-icon="chevron-down" class="mn-chev"></i></button>
    </div>
    <nav class="mn-nav" aria-label="Main">
      <a class="mn-item"><i data-icon="home"></i> Home</a>
      <a class="mn-item"><i data-icon="clipboard"></i> Surveys <i data-icon="chevron-up" class="mn-chev"></i></a>
      <div class="mn-sub">
        <a class="mn-subitem">All surveys</a>
        <a class="mn-subitem is-active">Projects</a>
      </div>
      <a class="mn-item"><i data-icon="refresh"></i> 360 feedback</a>
      <a class="mn-item"><i data-icon="globe"></i> Organization <i data-icon="chevron-down" class="mn-chev"></i></a>
    </nav>
    <div class="mn-foot">
      <a class="mn-item"><i data-icon="book-open"></i> Support wiki</a>
      <div class="mn-foot-divider"></div>
      <div class="mn-user">
        <div class="av av-36 av-blue">JI</div>
        <div class="mn-meta">
          <div class="mn-name">Jente Insing</div>
          <div class="mn-org">Novanta B.V.</div>
        </div>
        <i data-icon="chevron-down"></i>
      </div>
    </div>
  </div>

  <div class="main">

(function wireScores() {
  const table = document.getElementById('view-scores');
  const scTable = table.querySelector('.sc-table');
  if (scTable) {
    const line = document.createElement('div');
    line.className = 'sc-frozen-line';
    scTable.insertBefore(line, scTable.firstChild);
    const fit = () => { const h = scTable.scrollHeight; line.style.height = h + 'px'; line.style.marginBottom = (-h) + 'px'; };
    fit();
    if (window.ResizeObserver) new ResizeObserver(fit).observe(scTable);
    scTable.addEventListener('scroll', () => { scTable.classList.toggle('is-scrolled', scTable.scrollLeft > 0); });
  }
  table.querySelectorAll('.sc-head-title').forEach(btn => {
    btn.addEventListener('click', () => { const g = btn.closest('.sc-group'); g.dataset.open = g.dataset.open === 'true' ? 'false' : 'true'; });
  });
  const legend = table.querySelector('.sc-legend');
  if (legend) {
    const PCT = { 'is-vpos': '+20%', 'is-pos': '+10%', 'is-neg': '-10%', 'is-vneg': '-20%' };
    const TEN = { 'is-vpos': '+1.5', 'is-pos': '+0.7', 'is-neg': '-0.7', 'is-vneg': '-1.5' };

    let swapTimer = null; legend.dataset.lscale = 'pct';
    const swapLegend = (key, map) => {
      if (legend.dataset.lscale === key) return;
      legend.dataset.lscale = key; legend.classList.add('is-swapping');
      clearTimeout(swapTimer); swapTimer = setTimeout(() => { setLegend(map); legend.classList.remove('is-swapping'); }, 160);
    };
    let hoverTimer = null;
    table.querySelectorAll('.sc-row').forEach(row => {
      const ten = row.dataset.scale === '10';
      row.addEventListener('mouseenter', () => { clearTimeout(hoverTimer); hoverTimer = setTimeout(() => swapLegend(ten ? 'ten' : 'pct', ten ? TEN : PCT), 250); });
      row.addEventListener('mouseleave', () => clearTimeout(hoverTimer));
    });
  }
  const search = table.querySelector('.sc-search-input');
  if (search) {
    search.addEventListener('input', () => {
      const term = search.value.trim().toLowerCase();
      table.querySelectorAll('.sc-group').forEach(g => {
        let any = false;
        g.querySelectorAll('.sc-row').forEach(row => { const match = row.querySelector('.sc-q').textContent.toLowerCase().includes(term); row.hidden = !match; if (match) any = true; });
        g.hidden = !any;
      });
    });
  }
  const cmpBtn = document.getElementById('sc-cmp-btn');
  const pop = document.getElementById('sc-cmp-pop');
  if (cmpBtn && pop) {
    const showView = (v) => pop.querySelectorAll('.sc-pop-view').forEach(pv => { pv.hidden = pv.dataset.cmpview !== v; });
    cmpBtn.addEventListener('click', (e) => { e.stopPropagation(); pop.hidden = !pop.hidden; if (!pop.hidden) showView('main'); });
    pop.addEventListener('click', (e) => e.stopPropagation());
    document.addEventListener('click', () => { pop.hidden = true; });
    pop.querySelector('[data-cmpgoto="segments"]')?.addEventListener('click', () => showView('segments'));
    pop.querySelector('#sc-cmp-back')?.addEventListener('click', () => showView('main'));
    const ageCb = document.getElementById('sc-seg-age-cb');
    const ageSeg = pop.querySelector('.sc-seg[data-seg="age"]');
    const ageCats = ageSeg ? ageSeg.querySelectorAll('.sc-seg-cat .cb') : [];
    const cmpCount = document.getElementById('sc-cmp-count');
    const segApplied = document.getElementById('sc-seg-applied');
    const quickChips = pop.querySelectorAll('.sc-quick-chip');
    const recomputeCount = () => {
      const active = pop.querySelectorAll('.sc-quick-chip.is-active').length + (ageCb && ageCb.checked ? 1 : 0);
      cmpCount.textContent = active + ' selected';
    };
    const hideAgeCol = (key, hidden) => { table.querySelectorAll(`[data-age="${key}"]`).forEach(el => { el.style.display = hidden ? 'none' : ''; }); };
    const applyAge = () => {
      const on = ageCb.checked;
      table.classList.toggle('seg-age', on);
      ageSeg.classList.toggle('is-selected', on);
      if (on) ageSeg.classList.add('is-open');
      ageCats.forEach(c => { c.checked = on; if (c.dataset.cat) hideAgeCol(c.dataset.cat, !on); });
      segApplied.textContent = (on ? '1' : '0') + ' applied';
      recomputeCount();
    };
    ageCb?.addEventListener('change', applyAge);
    const setColVisible = (col, vis) => { table.querySelectorAll(`[data-col="${col}"]`).forEach(el => { el.style.display = vis ? 'flex' : 'none'; }); };
    quickChips.forEach(chip => {
      if (chip.dataset.qcol) setColVisible(chip.dataset.qcol, chip.classList.contains('is-active'));
      chip.addEventListener('click', () => { chip.classList.toggle('is-active'); if (chip.dataset.qcol) setColVisible(chip.dataset.qcol, chip.classList.contains('is-active')); recomputeCount(); });
    });
    ageCats.forEach(c => c.addEventListener('change', () => { if (c.dataset.cat) hideAgeCol(c.dataset.cat, !c.checked); }));
    pop.querySelectorAll('.sc-seg-title').forEach(t => t.addEventListener('click', () => {
      const seg = t.closest('.sc-seg');
      const opening = !seg.classList.contains('is-open');
      seg.classList.toggle('is-open');
      if (opening && seg.dataset.seg === 'age' && ageCb && !ageCb.checked) { ageCb.checked = true; applyAge(); }
    }));
  }
})();

/* ───────── Wiring: per-question side panel ───────── */
(function wireScorePanel() {
  const scp = document.getElementById('scp-overlay');
  let scpChart = null;
  const clamp = (v, max) => Math.max(0, Math.min(max, v));
  const open = (row) => {
    const q = row.dataset.q;
    const scale = row.dataset.scale === '10' ? '10' : '%';
    const max = scale === '10' ? 10 : 100;
    const group = parseFloat(row.dataset.group);
    const bench = parseFloat(row.dataset.bench);
    const fmtv = (v) => scale === '10' ? Number(v).toFixed(1) : Math.round(v) + '%';
    document.getElementById('scp-title').textContent = q;
    const agreeTotal = Math.round(scale === '10' ? group * 10 : group);
    const sAgree = Math.round(agreeTotal * 0.65);
    const agree = agreeTotal - sAgree;
    const rest = 100 - agreeTotal;
    const sDis = Math.round(rest * 0.25);
    const disagree = Math.round(rest * 0.40);
    const neutral = rest - sDis - disagree;
    const segs = [
      { cls: 'is-sdis', v: sDis }, { cls: 'is-disagree', v: disagree }, { cls: 'is-neutral', v: neutral },
      { cls: 'is-agree', v: agree }, { cls: 'is-sagree', v: sAgree }
    ];
    document.getElementById('scp-dist-bar').innerHTML = segs.map(s => `<div class="dist-seg ${s.cls}" style="width:${s.v}%">${s.v >= 12 ? s.v + '%' : ''}</div>`).join('');
    const br = document.getElementById('scp-agree-bracket');
    br.style.width = agreeTotal + '%';
    document.getElementById('scp-agree-lbl').textContent = agreeTotal + '% agree with this statement';
    const cards = [{ lbl: d.groupName, val: fmtv(group) }, { lbl: 'Effectory Index', val: fmtv(bench) }];
    document.getElementById('scp-cards').innerHTML = cards.map(c => `<div class="engp-card-item"><div class="engp-card-lbl">${c.lbl}</div><div class="engp-card-val">${c.val}</div></div>`).join('');
    document.getElementById('scp-chart-grp').textContent = d.groupName;
    const theme = QUESTION_THEME[q];
    const sec = document.getElementById('scp-theme-section');
    if (theme) {
      sec.hidden = false;
      document.getElementById('scp-theme-tag').textContent = theme;
      document.getElementById('scp-theme-rows').innerHTML = PANEL_THEMES[theme].map(x =>
        `<div class="engp-q-row"><span class="engp-q-text">${x.q}</span><span class="engp-q-score">${x.v.novanta.after}%</span></div>`).join('');
    } else { sec.hidden = true; }
    const tip = TIPS[q];
    const tipsUl = document.getElementById('scp-tips'), bpEl = document.getElementById('scp-bp');
    if (tip) { tipsUl.innerHTML = tip.tips.map(t => `<li>${t}</li>`).join(''); bpEl.textContent = tip.bp; }
    else { tipsUl.innerHTML = `<li>No tips available for this question yet.</li>`; bpEl.textContent = ''; }
    scp.querySelectorAll('.sp-tab').forEach(t => t.classList.toggle('is-active', t.dataset.scptab === 'insights'));
    scp.querySelectorAll('.scp-tabpanel').forEach(pn => { pn.hidden = pn.dataset.scptab !== 'insights'; });
    scp.hidden = false;
    if (window.Icons) window.Icons.render(scp);
    (() => {
      const bar = document.getElementById('scp-dist-bar');
      const ag = bar.querySelector('.is-agree') || bar.querySelector('.is-sagree');
      if (ag) { const bR = bar.getBoundingClientRect(), aR = ag.getBoundingClientRect(); br.style.width = Math.max(0, Math.round(bR.right - aR.left)) + 'px'; }
    })();
    if (scpChart) { scpChart.destroy(); scpChart = null; }
    const hasPrev = row.dataset.prev != null;
    const labels = hasPrev ? [d.prevDateTo, d.dateTo] : [d.dateTo];
    const series = (hasPrev ? [parseFloat(row.dataset.prev), group] : [group]).map(v => clamp(v, max));
    scpChart = makeLineChart(document.getElementById('scp-chart'), labels, series, { max, unit: scale === '10' ? '' : '%' });
  };
  document.querySelectorAll('#view-scores .sc-row').forEach(row => {
    row.querySelector('.sc-q')?.addEventListener('click', () => open(row));
    row.querySelector('.sc-insights')?.addEventListener('click', (e) => { e.stopPropagation(); open(row); });
  });
  scp.querySelectorAll('.sp-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const t = tab.dataset.scptab;
      scp.querySelectorAll('.sp-tab').forEach(x => x.classList.toggle('is-active', x === tab));
      scp.querySelectorAll('.scp-tabpanel').forEach(pn => { pn.hidden = pn.dataset.scptab !== t; });
    });
  });
  const closeScp = () => { scp.hidden = true; };
  document.getElementById('scp-close').addEventListener('click', closeScp);
  scp.addEventListener('click', (e) => { if (e.target === scp) closeScp(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !scp.hidden) closeScp(); });
})();

/* ---------- Tooltip auto-position ---------- */
(function () {
  const GAP = 10, PAD = 8;
  const place = (demo) => {
    const tip = demo.querySelector('.tooltip');
    if (!tip) return;
    tip.style.position = 'fixed'; tip.style.margin = '0'; tip.style.transform = 'none';
    tip.style.left = '0'; tip.style.top = '0'; tip.style.right = 'auto'; tip.style.bottom = 'auto'; tip.style.height = 'auto';
    const t = demo.getBoundingClientRect();
    const tw = tip.offsetWidth, th = tip.offsetHeight, vw = window.innerWidth, vh = window.innerHeight;
    const pref = tip.classList.contains('is-below') ? 'below' : tip.classList.contains('is-left') ? 'left' : tip.classList.contains('is-right') ? 'right' : 'above';
    const fits = { above: t.top - th - GAP >= PAD, below: t.bottom + th + GAP <= vh - PAD, left: t.left - tw - GAP >= PAD, right: t.right + tw + GAP <= vw - PAD };
    const dir = [pref, 'above', 'below', 'right', 'left'].find(dd => fits[dd]) || pref;
    let x, y;
    if (dir === 'above')      { x = t.left + t.width / 2 - tw / 2; y = t.top - th - GAP; }
    else if (dir === 'below') { x = t.left + t.width / 2 - tw / 2; y = t.bottom + GAP; }
    else if (dir === 'left')  { x = t.left - tw - GAP; y = t.top + t.height / 2 - th / 2; }
    else                      { x = t.right + GAP; y = t.top + t.height / 2 - th / 2; }
    tip.style.left = Math.max(PAD, Math.min(x, vw - tw - PAD)) + 'px';
    tip.style.top = Math.max(PAD, Math.min(y, vh - th - PAD)) + 'px';
    tip.classList.remove('is-above', 'is-below', 'is-left', 'is-right');
    tip.classList.add('is-' + dir);
  };
  const onEnter = (e) => { const demo = e.target.closest && e.target.closest('.tt-demo'); if (demo) place(demo); };
  document.addEventListener('mouseover', onEnter);
  document.addEventListener('focusin', onEnter);
})();
</script>
