<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Announcement playground — Prototype</title>
  <base href="/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/tokens.css" />
  <link rel="stylesheet" href="/foundation.css" />
  <link rel="stylesheet" href="/components.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: 'Poppins', sans-serif; color: var(--content-base); background: var(--bg-secondary); -webkit-font-smoothing: antialiased; }

    .page { max-width: 620px; margin: 0 auto; padding: 56px 24px 180px; }
    .page-hd { margin-bottom: 26px; }
    .page-hd h1 { font-size: 26px; font-weight: 600; margin: 0 0 6px; letter-spacing: -.3px; }
    .page-hd p { font-size: 14px; color: var(--content-secondary); margin: 0; line-height: 1.5; }

    .panel { background: var(--bg-base); border: 1px solid var(--border-base); border-radius: 16px; box-shadow: 0 1px 2px rgba(25,39,67,.04), 0 12px 28px -16px rgba(25,39,67,.2); overflow: hidden; margin-bottom: 18px; }
    .panel-hd { padding: 16px 22px; font-size: 12px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--content-subtle); border-bottom: 1px solid var(--border-base); display: flex; align-items: center; }
    .set-row { display: flex; align-items: center; gap: 18px; padding: 16px 22px; border-bottom: 1px solid var(--border-base); }
    .set-row:last-child { border-bottom: 0; }
    .set-row.hidden { display: none; }
    .set-row .lbl { flex: 1; min-width: 0; }
    .set-row .lbl .t { font-size: 14px; font-weight: 500; }
    .set-row .lbl .d { font-size: 12.5px; color: var(--content-secondary); margin-top: 3px; line-height: 1.45; }
    .set-row .ctrl { flex-shrink: 0; display: flex; align-items: center; }
    .set-row .ctrl .tf { width: 270px; }

    .tf-num-wrap.count { width: 96px; }
    .tf-num-wrap.count .tf-num { text-align: center; }

    /* per-card config block */
    .card-cfg .panel-hd { justify-content: space-between; }
    .card-cfg .swatch { width: 14px; height: 14px; border-radius: 4px; }
    .card-cfg .tag { font-size: 10px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; padding: 1px 6px; border-radius: 99px; background: var(--bg-highlight-subtle); color: var(--content-highlight-base); border: 1px solid var(--border-highlight-subtle); }
    .card-cfg-hd-left { display: flex; align-items: center; gap: 9px; }

    .foot { display: flex; gap: 10px; align-items: center; }
    .foot .hint { font-size: 12.5px; color: var(--content-subtle); margin-left: auto; }

    /* ── Announcement, floating bottom-right ── */
    #announcement { position: fixed; right: 30px; bottom: 30px; z-index: 1000;
      --ann-dur: 560ms; --ann-ease: cubic-bezier(.4,0,.2,1); --ann-drop: 280px; }
    #announcement .ann-deck { width: 300px; }
    #announcement .ann-deck .announcement {
      /* travels for most of the duration, then fades only at the end → the drop is visible */
      transition: transform var(--ann-dur) var(--ann-ease), opacity calc(var(--ann-dur) * .4) ease calc(var(--ann-dur) * .55);
    }
    /* slide (drop): front falls, behind cards promote up — and the deck height eases simultaneously (JS) */
    #announcement .ann-front.is-leaving { transform: translateY(var(--ann-drop)); opacity: 0; }
    /* smooth illustration reveal/collapse */
    #announcement .ann-media { overflow: hidden; transition: height var(--ann-dur) var(--ann-ease), opacity calc(var(--ann-dur) * .8) ease; }
    #announcement .ann-media.is-collapsed { height: 0; opacity: 0; }
    /* entry */
    .ann-enter { animation: annIn var(--ann-dur) var(--ann-ease) both; }
    @keyframes annIn { from { opacity: 0; transform: translateY(20px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-hd">
      <h1>Announcement playground</h1>
      <p>Configure each card below — the announcement updates live in the bottom-right corner. Click <strong>Learn more</strong> or <strong>Close</strong> to page through the stack.</p>
    </div>

    <!-- count -->
    <div class="panel">
      <div class="set-row">
        <div class="lbl"><div class="t">Number of announcements</div><div class="d">How many cards are queued in the deck.</div></div>
        <div class="ctrl">
          <div class="tf-num-wrap count">
            <input class="tf-num" id="s-count" type="number" value="3" min="1" max="4" />
            <div class="tf-num-stepper">
              <button class="tf-num-btn" data-step="1" aria-label="More"><i data-icon="chevron-up"></i></button>
              <button class="tf-num-btn" data-step="-1" aria-label="Fewer"><i data-icon="chevron-down"></i></button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- per-card config blocks -->
    <div id="cards"></div>

    <div class="foot">
      <button class="btn btn-primary" id="s-show">Show announcement</button>
      <span class="hint">Closed all of them? Hit "Show announcement".</span>
    </div>
  </div>

  <!-- Floating announcement (card deck) -->
  <div id="announcement"></div>

  <script src="/icons.js"></script>
  <script>
    const BG = ['#6c5ce7', '#0a9d99', '#ec9f06', '#3174db'];
    const DUR = 560, EASE = 'cubic-bezier(.4,0,.2,1)';   // baked-in slide animation
    const $host = document.getElementById('announcement');
    const $cards = document.getElementById('cards');
    const PH = '<i data-icon="image" class="ann-media-ph"></i>';
    const el = (id) => document.getElementById(id);
    function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

    // master config — up to 4 cards; `count` decides how many are shown
    const CARDS = [
      { title:'Dynamic reporting is here!', body:'A new look, new features, and even more to explore.', media:true,  cta:true,  ctaLabel:'Learn more' },
      { title:'Compare across groups',      body:'Benchmark any team against the company in one click.', media:false, cta:true,  ctaLabel:'View groups' },
      { title:'Export to PowerPoint',       body:'Download a ready-made results deck for your meeting.',  media:false, cta:true,  ctaLabel:'Try export' },
      { title:'New: Topics & Ideas',        body:'See the themes employees suggest most often.',          media:true,  cta:false, ctaLabel:'Learn more' },
    ];
    let count = 3, idx = 0, first = true;

    /* ── settings form (rebuilt only when count changes) ── */
    function tgl(i, field, on){
      return `<label class="tgl-wrap"><input type="checkbox" class="tgl" data-card="${i}" data-field="${field}" ${on?'checked':''}><span class="tgl-track"><span class="tgl-thumb"></span></span></label>`;
    }
    function blockHtml(i){
      const c = CARDS[i];
      return `<div class="panel card-cfg" data-block="${i}">
        <div class="panel-hd">
          <span class="card-cfg-hd-left"><span class="swatch" style="background:${c.media?BG[i]:'var(--bg-tertiary)'}"></span> Card ${i+1}</span>
          ${i===0?'<span class="tag">featured</span>':''}
        </div>
        <div class="set-row"><div class="lbl"><div class="t">Illustration</div></div><div class="ctrl">${tgl(i,'media',c.media)}</div></div>
        <div class="set-row"><div class="lbl"><div class="t">Title</div></div><div class="ctrl"><input class="tf" type="text" data-card="${i}" data-field="title" value="${esc(c.title)}"></div></div>
        <div class="set-row"><div class="lbl"><div class="t">Message</div></div><div class="ctrl"><input class="tf" type="text" data-card="${i}" data-field="body" value="${esc(c.body)}"></div></div>
        <div class="set-row"><div class="lbl"><div class="t">Call-to-action button</div></div><div class="ctrl">${tgl(i,'cta',c.cta)}</div></div>
        <div class="set-row cta-label-row ${c.cta?'':'hidden'}"><div class="lbl"><div class="t">Button label</div></div><div class="ctrl"><input class="tf" type="text" data-card="${i}" data-field="ctaLabel" value="${esc(c.ctaLabel)}"></div></div>
      </div>`;
    }
    function renderForm(){
      let h = '';
      for (let i = 0; i < count; i++) h += blockHtml(i);
      $cards.innerHTML = h;
      if (window.Icons && window.Icons.render) window.Icons.render($cards);
    }

    /* ── live announcement deck ── */
    function card(i, cls){
      const c = CARDS[i];
      const media = `<div class="ann-media ${c.media?'':'is-collapsed'}" style="background:${BG[i]}; color:rgba(255,255,255,.85);">${PH}</div>`;
      const cta = c.cta ? `<button class="btn btn-primary" data-next>${esc(c.ctaLabel)||'Learn more'}</button>` : '';
      return `<div class="announcement ${cls}">${media}<div class="ann-body">`+
        `<p class="ann-title">${esc(c.title)}</p><p class="ann-text">${esc(c.body)}</p>`+
        `<div class="ann-actions">${cta}<button class="btn btn-tertiary" data-next>Close</button></div></div></div>`;
    }
    // measure a card's natural height off-screen (inside #announcement so the collapsed-media rule applies)
    function measureFront(i){
      const probe = document.createElement('div');
      probe.style.cssText = 'position:absolute; left:-9999px; top:0; visibility:hidden;';
      probe.innerHTML = `<div class="ann-deck" style="width:300px;">${card(i,'ann-front')}</div>`;
      $host.appendChild(probe);
      const h = probe.querySelector('.ann-front').offsetHeight;
      probe.remove();
      return h;
    }
    function renderDeck(){
      if (count <= 0 || idx >= count) { $host.innerHTML = ''; return; }
      const layers = [];
      if (idx + 2 < count) layers.push(card(idx + 2, 'ann-b2'));
      if (idx + 1 < count) layers.push(card(idx + 1, 'ann-b1'));
      layers.push(card(idx, 'ann-front'));
      $host.innerHTML = `<div class="ann-deck${first ? ' ann-enter' : ''}">${layers.join('')}</div>`;
      first = false;
      if (window.Icons && window.Icons.render) window.Icons.render($host);
    }
    function advance(){
      const deck = $host.querySelector('.ann-deck');
      const front = $host.querySelector('.ann-front');
      if (!front || !deck || front.classList.contains('is-leaving')) return;
      // front drops AND the card behind resizes into place at the same time
      const next = idx + 1;
      if (next < count) {
        const h0 = deck.offsetHeight, h1 = measureFront(next);
        if (h1 && h1 !== h0) {
          deck.style.height = h0 + 'px';
          deck.getBoundingClientRect();
          deck.style.transition = 'height ' + DUR + 'ms ' + EASE;
          deck.style.height = h1 + 'px';
        }
      }
      front.classList.add('is-leaving');
      const b1 = $host.querySelector('.ann-b1'); if (b1) b1.classList.add('is-promoting');
      const b2 = $host.querySelector('.ann-b2'); if (b2) b2.classList.add('is-promoting');
      setTimeout(() => { idx += 1; renderDeck(); }, DUR);
    }
    function reshow(){ idx = 0; first = true; renderDeck(); }
    function setCount(n){ count = Math.max(1, Math.min(4, n)); el('s-count').value = count; renderForm(); reshow(); }

    /* ── wiring ── */
    $host.addEventListener('click', (e) => { if (e.target.closest('[data-next]')) advance(); });
    el('s-count').addEventListener('input', () => setCount(parseInt(el('s-count').value,10)||1));
    document.querySelectorAll('.tf-num-btn[data-step]').forEach(b => b.addEventListener('click', () =>
      setCount((parseInt(el('s-count').value,10)||0) + parseInt(b.dataset.step,10))
    ));
    function onEdit(e){
      const t = e.target;
      if (t.dataset.card === undefined) return;
      const i = +t.dataset.card, f = t.dataset.field;
      if (f === 'media' || f === 'cta') {
        CARDS[i][f] = t.checked;
        if (f === 'cta') t.closest('.card-cfg').querySelector('.cta-label-row').classList.toggle('hidden', !t.checked);
        if (f === 'media') {
          t.closest('.card-cfg').querySelector('.swatch').style.background = t.checked ? BG[i] : 'var(--bg-tertiary)';
          const m = (i === idx) ? $host.querySelector('.ann-front .ann-media') : null;
          if (m) { m.classList.toggle('is-collapsed', !t.checked); return; }
        }
      } else {
        CARDS[i][f] = t.value;
      }
      renderDeck();
    }
    $cards.addEventListener('input', onEdit);
    $cards.addEventListener('change', onEdit);
    el('s-show').addEventListener('click', reshow);

    renderForm();
    renderDeck();
  </script>
</body>
</html>
