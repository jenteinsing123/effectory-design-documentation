<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Changelog — Engage Design System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&family=Poppins:wght@300..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="topnav-placeholder"></div>

<div class="shell">
<div id="sidebar-placeholder"></div>

<div class="content-wrap">

  <div class="page-header-row">
    <div class="page-header">
      <div class="page-badges">
        <span class="page-updated" id="changelog-count">Loading…</span>
      </div>
      <h1 class="text-l1">Changelog</h1>
      <p class="page-desc">Every change to the design system, newest first — who changed what, pulled straight from the git history. Each component page also has its own Changelog tab.</p>
    </div>
  </div><!-- /page-header-row -->

  <div class="content-cols">
    <article class="content">
      <section class="section">
        <ul class="cl-list" id="changelog-all"><li class="cl-empty">Loading…</li></ul>
      </section>
    </article>
  </div>

</div><!-- /content-wrap -->
</div><!-- /shell -->

<script src="nav.js"></script>
</body>
</html>
